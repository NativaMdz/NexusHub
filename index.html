<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Hub - Cyberpunk Social</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === VARIÁVEIS GLOBAIS === */
        :root {
            --bg-base: #050507;
            --bg-glass: rgba(15, 15, 20, 0.75);
            --bg-glass-hover: rgba(25, 25, 35, 0.85);
            --border-glass: rgba(0, 243, 255, 0.2);
            
            /* Cores Neon */
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.5);
            --magenta: #ff00ff;
            --magenta-glow: rgba(255, 0, 255, 0.5);
            --purple: #b026ff;
            --purple-glow: rgba(176, 38, 255, 0.5);
            --danger: #ff2a2a;
            --success: #00ff88;
            
            /* Texto */
            --text-main: #e0e0e0;
            --text-muted: #888899;
        }

        /* === RESET & ESTRUTURA === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            /* Uso de dvh para suportar o resize dinâmico do teclado mobile */
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .neon-text {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        /* === PARTICLES CANVAS === */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 0;
            pointer-events: none;
        }

        /* === APP SHELL === */
        #app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(20, 10, 30, 0.85) 0%, rgba(5, 5, 7, 0.95) 70%);
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }

        header {
            padding: 1.2rem 1rem 0.9rem;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan-glow);
            cursor: pointer;
        }

        header .logo span { color: var(--cyan); }

        header .actions { display: flex; gap: 15px; align-items: center; }

        header .actions i {
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            transition: color 0.3s, text-shadow 0.3s;
        }

        header .actions i:hover {
            color: var(--magenta);
            text-shadow: 0 0 10px var(--magenta-glow);
        }

        main {
            flex: 1;
            /* overflow-x: hidden impede scroll horizontal acidental */
            overflow-x: hidden;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 90px;
            /* Flex layout na main para que as filhas (como o chat) possam expandir */
            display: flex;
            flex-direction: column; 
            scrollbar-width: none;
            position: relative;
        }
        main::-webkit-scrollbar { display: none; }

        /* NAV INFERIOR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            padding-bottom: calc(0.8rem + env(safe-area-inset-bottom));
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            width: 25%;
        }

        .nav-item i { font-size: 1.3rem; transition: all 0.3s ease; }
        .nav-item.active { color: var(--cyan); }
        .nav-item.active i { text-shadow: 0 0 15px var(--cyan-glow); transform: translateY(-3px); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -5px; width: 4px; height: 4px;
            background: var(--cyan); border-radius: 50%; box-shadow: 0 0 8px var(--cyan);
        }

        /* FAB - BOTÃO DE CRIAR POST (Reposicionado) */
        .fab {
            position: absolute;
            bottom: calc(85px + env(safe-area-inset-bottom)); 
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.4);
            cursor: pointer;
            z-index: 15;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(176, 38, 255, 0.6); }
        .fab:active { transform: scale(0.95); }

        /* POST CARDS */
        .post-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease forwards;
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.8rem; }
        .avatar {
            width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
            border: 2px solid transparent;
            background-image: linear-gradient(var(--bg-base), var(--bg-base)), linear-gradient(45deg, var(--cyan), var(--purple));
            background-origin: border-box; background-clip: content-box, border-box;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-info h3 { font-size: 0.95rem; margin: 0; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info span { font-size: 0.78rem; color: var(--cyan); }
        
        .badge-verified { color: var(--cyan); font-size: 0.8rem; }

        .post-content { font-size: 0.92rem; line-height: 1.5; margin-bottom: 0.8rem; color: #d8d8d8; word-break: break-word; user-select: text; }
        .post-image { width: 100%; max-height: 380px; object-fit: cover; border-radius: 10px; margin-bottom: 0.8rem; border: 1px solid rgba(0, 243, 255, 0.25); }

        .post-actions { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 0.8rem; }
        .action-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.2s; }
        .action-btn i { font-size: 1rem; }
        .action-btn.liked { color: var(--magenta); text-shadow: 0 0 10px var(--magenta-glow); }
        .action-btn:hover { color: var(--cyan); }

        /* PERFIL */
        .profile-header {
            display: flex; flex-direction: column; align-items: center; padding: 1.8rem 1rem;
            background: var(--bg-glass); border-radius: 16px; margin-bottom: 1.2rem;
            border: 1px solid rgba(176, 38, 255, 0.25); box-shadow: 0 0 25px rgba(176, 38, 255, 0.12);
            animation: fadeIn 0.4s ease forwards; text-align: center;
        }
        .profile-avatar { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 3px solid var(--purple); box-shadow: 0 0 15px rgba(176, 38, 255, 0.6); margin-bottom: 0; }
        .profile-name { font-size: 1.4rem; color: var(--text-main); margin-bottom: 4px; }
        .profile-handle { color: var(--cyan); font-size: 0.85rem; margin-bottom: 1.2rem; }
        
        .stats-container { display: flex; width: 100%; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 0.9rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 1.15rem; font-weight: bold; font-family: 'Rajdhani', sans-serif; }
        .stat-value.neon-purple { color: var(--purple); text-shadow: 0 0 8px rgba(176,38,255,0.6); }
        .stat-value.neon-cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0,243,255,0.6); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

        /* CHAT / COMMS */
        .chat-container { 
            display: flex; 
            flex-direction: column; 
            flex: 1; /* Ocupa 100% da main */
            min-height: 0; /* Permite redução correta pelo flexbox quando o teclado abre */
        }
        
        .chat-header-info {
            font-size: 0.8rem; 
            color: var(--text-muted); 
            text-align: center; 
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding-right: 5px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            min-height: 0; /* Impede transbordamento do layout flex */
            margin-bottom: 15px; /* Espaço entre mensagens e barra */
            scroll-behavior: smooth;
        }
        
        .message { display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.3s ease; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--purple); flex-shrink: 0; }
        .msg-bubble { background: rgba(255,255,255,0.06); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); position: relative; user-select: text; }
        .message.mine .msg-bubble { background: rgba(0, 243, 255, 0.12); border-color: rgba(0, 243, 255, 0.3); border-bottom-right-radius: 2px; }
        .message:not(.mine) .msg-bubble { border-bottom-left-radius: 2px; }
        .msg-author { font-size: 0.72rem; color: var(--cyan); margin-bottom: 3px; font-family: 'Rajdhani', sans-serif; font-weight: bold; }
        .msg-text { font-size: 0.88rem; line-height: 1.4; word-break: break-word; }
        .msg-time { font-size: 0.62rem; color: var(--text-muted); text-align: right; margin-top: 4px; display: block; }

        /* Nova Barra de Chat */
        .chat-input-area { 
            display: flex; 
            gap: 10px; 
            background: rgba(15, 15, 20, 0.9); 
            padding: 10px 14px; 
            border-radius: 24px; 
            border: 1px solid rgba(0, 243, 255, 0.3); 
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
        }

        .chat-attach-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .chat-attach-btn:hover { color: var(--cyan); }

        .chat-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            outline: none; 
            padding: 6px 4px; 
            font-size: 0.95rem;
            min-width: 0; /* Previne que inputs grandes quebrem o flexbox lateralmente */
        }
        .chat-input::placeholder { color: rgba(255,255,255,0.4); }

        .chat-send-btn { 
            background: linear-gradient(135deg, var(--cyan), #0088ff);
            color: #000; 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.2s; 
            flex-shrink: 0; 
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
        }
        .chat-send-btn:hover { transform: scale(1.08); box-shadow: 0 0 18px var(--cyan); }
        .chat-send-btn i { font-size: 1rem; margin-left: -2px; }

        /* RANKING */
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .rank-card { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); transition: transform 0.2s; }
        .rank-card:hover { transform: translateX(4px); background: rgba(255,255,255,0.07); border-color: var(--cyan); }
        .rank-pos { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: bold; color: var(--text-muted); width: 28px; text-align: center; }
        .rank-card:nth-child(1) .rank-pos { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-card:nth-child(2) .rank-pos { color: #c0c0c0; text-shadow: 0 0 10px rgba(192,192,192,0.5); }
        .rank-card:nth-child(3) .rank-pos { color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.5); }
        .rank-info { flex: 1; min-width: 0; }
        .rank-info h4 { font-size: 0.95rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-info span { font-size: 0.75rem; color: var(--text-muted); }
        .rank-score { font-family: 'Rajdhani', sans-serif; font-weight: bold; color: var(--cyan); font-size: 1.1rem; }

        /* MODAIS & FORMULÁRIOS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #0a0a0f; width: 90%; max-width: 480px; border-radius: 16px; border: 1px solid var(--purple); box-shadow: 0 0 30px rgba(176, 38, 255, 0.25); padding: 1.4rem; position: relative; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .modal-header h2 { font-size: 1.1rem; color: var(--cyan); }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
        .close-modal:hover { color: var(--danger); }

        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12); color: white; padding: 12px; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.3s; user-select: text; }
        .form-control:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        textarea.form-control { resize: vertical; min-height: 90px; }
        
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--cyan), var(--purple)); border: none; border-radius: 8px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(176,38,255,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
        .file-upload-btn { display: inline-block; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--cyan); border-radius: 8px; color: var(--cyan); cursor: pointer; font-size: 0.85rem; text-align: center; width: 100%; transition: background 0.3s; }
        .file-upload-btn:hover { background: rgba(0,243,255,0.1); }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        #image-preview-container { margin-top: 10px; display: none; position: relative; }
        #image-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-glass); }
        .remove-img-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        /* TOAST NOTIFICAÇÕES */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border-left: 4px solid var(--cyan); color: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; animation: slideDown 0.3s ease forwards; }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* TELA DE AUTENTICAÇÃO / LOGIN INICIAL */
        #auth-setup { position: fixed; top:0; left:0; width: 100vw; height: 100dvh; background: var(--bg-base); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; text-align: center; }
        .glitch-logo { font-size: 2.8rem; font-family: 'Rajdhani', sans-serif; font-weight: bold; text-shadow: 0 0 20px var(--cyan); margin-bottom: 1.5rem; color: white; }
        .glitch-logo span { color: var(--cyan); }

        /* ANIMAÇÕES & HELPERS */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; text-align: center; color: var(--text-muted); animation: fadeIn 0.4s ease; }
        .placeholder-view i { font-size: 2.8rem; color: var(--purple); margin-bottom: 1rem; text-shadow: 0 0 15px var(--purple); }
    </style>
</head>
<body>

    <!-- Canvas para Partículas Futuristas -->
    <canvas id="particles"></canvas>

    <!-- Container de Mensagens Notificações (Toasts) -->
    <div id="toast-container"></div>

    <!-- Tela Inicial: Criação de Identidade / Perfil Local -->
    <div id="auth-setup">
        <div class="glitch-logo">NEXUS<span>HUB</span></div>
        <p style="color: var(--text-muted); margin-bottom: 1.8rem; max-width: 320px; font-size: 0.9rem;">
            Acesso ao Link Neural detectado. Identifique-se para entrar na rede.
        </p>
        <div style="width: 100%; max-width: 380px; background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 0 30px rgba(0,243,255,0.1);">
            <div class="form-group">
                <input type="text" id="setup-name" class="form-control" placeholder="Seu Nome / Apelido" maxlength="25">
            </div>
            <div class="form-group">
                <input type="text" id="setup-handle" class="form-control" placeholder="Handle (Ex: @cyber_net)" maxlength="18">
            </div>
            <button class="btn-primary" id="btn-create-identity" onclick="app.setupIdentity()">Iniciar Conexão</button>
        </div>
    </div>

    <!-- Shell do Aplicativo Principal -->
    <div id="app-container" style="display: none;">
        <!-- Cabeçalho Superior -->
        <header>
            <div class="logo" onclick="app.navigate('feed')">NEXUS<span>HUB</span></div>
            <div class="actions">
                <i class="fa-solid fa-gear" onclick="app.openSettingsModal()" title="Configurações"></i>
                <i class="fa-solid fa-right-from-bracket" onclick="app.logout()" title="Sair / Resetar"></i>
            </div>
        </header>

        <!-- Container dinâmico das telas da SPA -->
        <main id="app-content"></main>

        <!-- Botão Flutuante (+) para novas postagens -->
        <div class="fab" id="fab-add-post" onclick="app.openPostModal()" style="display: none;">
            <i class="fa-solid fa-plus"></i>
        </div>

        <!-- Barra de Navegação Inferior (Mobile First) -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-view="feed" onclick="app.navigate('feed', this)">
                <i class="fa-solid fa-house"></i>
                <span>Feed</span>
            </div>
            <div class="nav-item" data-view="chat" onclick="app.navigate('chat', this)">
                <i class="fa-solid fa-comment-dots"></i>
                <span>Comms</span>
            </div>
            <div class="nav-item" data-view="ranking" onclick="app.navigate('ranking', this)">
                <i class="fa-solid fa-trophy"></i>
                <span>Ranking</span>
            </div>
            <div class="nav-item" data-view="perfil" onclick="app.navigate('perfil', this)">
                <i class="fa-regular fa-user"></i>
                <span>Perfil</span>
            </div>
        </nav>
    </div>

    <!-- Modal: Nova Transmissão (Post) -->
    <div class="modal-overlay" id="modal-post">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Transmissão</h2>
                <button class="close-modal" onclick="app.closePostModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-group">
                <textarea id="post-content" class="form-control" placeholder="Compartilhe algo na malha da cidade..."></textarea>
            </div>
            <div class="file-upload-wrapper">
                <label class="file-upload-btn">
                    <i class="fa-solid fa-image"></i> Anexar Imagem
                    <input type="file" id="post-image-input" accept="image/*" onchange="app.handleImageUpload(event)">
                </label>
                <div id="image-preview-container">
                    <img id="image-preview" src="" alt="Preview">
                    <button class="remove-img-btn" onclick="app.removeImagePreview()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <button class="btn-primary" id="btn-publish" onclick="app.publishPost()">Transmitir Dados</button>
        </div>
    </div>

    <!-- Modal: Configurações de Armazenamento -->
    <div class="modal-overlay" id="modal-settings">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações do Hub</h2>
                <button class="close-modal" onclick="app.closeSettingsModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p style="font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem;">
                Atualmente executando em modo <strong>Armazenamento Local Autônomo</strong>. Funciona perfeitamente offline ou direto do armazenamento do celular.
            </p>
            <div class="form-group">
                <label style="font-size: 0.75rem; color: var(--cyan); display: block; margin-bottom: 5px;">MODO DE OPERAÇÃO</label>
                <input type="text" class="form-control" value="LocalStorage / Dispositivo Local" disabled style="opacity: 0.7;">
            </div>
            <button class="btn-primary" onclick="app.closeSettingsModal()">Confirmar e Fechar</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- TEMPLATES DE CONTEÚDO DENTRO DA SPA       -->
    <!-- ========================================== -->

    <template id="tpl-chat">
        <div class="chat-container">
            <div class="chat-header-info">
                <i class="fa-solid fa-lock" style="color: var(--cyan);"></i> Canal de Frequência Criptografado
            </div>
            <div class="chat-messages" id="chat-messages-container"></div>
            
            <div class="chat-input-area">
                <button class="chat-attach-btn" onclick="app.showToast('Módulo de anexo em desenvolvimento.', 'info')">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="text" id="chat-input" class="chat-input" placeholder="Transmitir mensagem..." onkeypress="app.handleChatKeyPress(event)">
                <button class="chat-send-btn" onclick="app.sendChatMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-ranking">
        <div style="margin-bottom: 15px; text-align: center;">
            <i class="fa-solid fa-ranking-star" style="font-size: 1.8rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); margin-bottom: 5px;"></i>
            <h2 style="color: white; margin-bottom: 3px;">Hall dos Netrunners</h2>
            <p style="color: var(--text-muted); font-size: 0.8rem;">Maiores níveis e contribuições</p>
        </div>
        <div class="ranking-list" id="ranking-list-container"></div>
    </template>

    <!-- ========================================== -->
    <!-- MOTOR EM JAVASCRIPT PURA (OFFLINE READY)   -->
    <!-- ========================================== -->
    <script>
        // --- 1. GERENCIADOR DE BANCO DE DADOS LOCAL (STORAGE ENGINE) ---
        const DB = {
            PREFIX: 'NEXUS_HUB_v2_',
            
            get: (key, defaultValue = null) => {
                try {
                    const item = localStorage.getItem(DB.PREFIX + key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    console.error("Erro na leitura local:", e);
                    return defaultValue;
                }
            },
            
            set: (key, value) => {
                try {
                    localStorage.setItem(DB.PREFIX + key, JSON.stringify(value));
                    return true;
                } catch (e) {
                    console.error("Erro no armazenamento local (Cota excedida?):", e);
                    return false;
                }
            },

            // Inicializa dados fictícios iniciais para a rede não parecer vazia no primeiro uso
            seedInitialData: () => {
                if (!DB.get('seeded')) {
                    const samplePosts = [
                        {
                            id: 'post_1',
                            authorUid: 'bot_kira',
                            authorName: 'Kira_99',
                            authorHandle: '@kira_netrunner',
                            authorAvatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80',
                            content: 'Acabei de atualizar meu rig. A nova placa neural está processando dados em tempo recorde! Alguém mais testando o novo firmware? 🦾✨',
                            image: 'https://images.unsplash.com/photo-1614729939124-03290b5609ce?auto=format&fit=crop&w=600&q=80',
                            likes: ['bot_zero'],
                            createdAt: new Date(Date.now() - 3600000 * 2).toISOString()
                        },
                        {
                            id: 'post_2',
                            authorUid: 'bot_zero',
                            authorName: 'Zero',
                            authorHandle: '@zero_cool',
                            authorAvatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80',
                            content: 'A estética de Neo-Tokyo à noite nunca decepciona. As luzes de neon refletindo na chuva criam o melhor cenário para codificar. 🌧️🌃',
                            image: '',
                            likes: ['bot_kira'],
                            createdAt: new Date(Date.now() - 3600000 * 5).toISOString()
                        }
                    ];

                    const sampleChat = [
                        { id: 'msg_1', authorUid: 'bot_kira', authorName: 'Kira_99', authorAvatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80', content: 'Sinal estabilizado no setor 7.', createdAt: new Date(Date.now() - 60000 * 10).toISOString() },
                        { id: 'msg_2', authorUid: 'bot_zero', authorName: 'Zero', authorAvatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80', content: 'Copiado. Transmitindo os dados do pacote.', createdAt: new Date(Date.now() - 60000 * 5).toISOString() }
                    ];

                    const sampleBotUsers = [
                        { uid: 'bot_kira', name: 'Kira_99', handle: '@kira_netrunner', avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80', xp: 450, level: 7 },
                        { uid: 'bot_zero', name: 'Zero', handle: '@zero_cool', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&q=80', xp: 310, level: 6 }
                    ];

                    DB.set('posts', samplePosts);
                    DB.set('messages', sampleChat);
                    DB.set('bot_users', sampleBotUsers);
                    DB.set('seeded', true);
                }
            }
        };

        // Estado da Aplicação
        window.appState = {
            currentUser: null,
            currentView: 'feed',
            tempBase64Image: null
        };

        // --- 2. CONTROLADOR PRINCIPAL DO APP ---
        const app = {
            init: () => {
                DB.seedInitialData();
                app.initParticles();

                // Verifica se já existe um usuário cadastrado neste dispositivo
                const savedUser = DB.get('user_profile');
                if (savedUser) {
                    appState.currentUser = savedUser;
                    document.getElementById('auth-setup').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    app.navigate('feed');
                } else {
                    document.getElementById('auth-setup').style.display = 'flex';
                    document.getElementById('app-container').style.display = 'none';
                }
            },

            // Configuração da Conta/Perfil Local
            setupIdentity: () => {
                const nameInput = document.getElementById('setup-name').value.trim();
                let handleInput = document.getElementById('setup-handle').value.trim();

                if (nameInput.length < 2 || handleInput.length < 2) {
                    app.showToast("Preencha nome e handle com no mínimo 2 caracteres.", "error");
                    return;
                }

                if (!handleInput.startsWith('@')) handleInput = '@' + handleInput;

                const uid = 'user_' + Date.now();
                const newUser = {
                    uid: uid,
                    name: nameInput,
                    handle: handleInput.toLowerCase().replace(/\s/g, ''),
                    avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`,
                    xp: 50,
                    level: 1,
                    ncoins: 100,
                    createdAt: new Date().toISOString()
                };

                DB.set('user_profile', newUser);
                appState.currentUser = newUser;

                app.showToast("Identidade Registrada no Dispositivo!", "success");
                document.getElementById('auth-setup').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                app.navigate('feed');
            },

            logout: () => {
                if (confirm("Deseja desconectar e apagar sua sessão local neste aparelho?")) {
                    localStorage.removeItem(DB.PREFIX + 'user_profile');
                    location.reload();
                }
            },

            // --- NAVEGAÇÃO SPA ---
            navigate: (viewName, navElement = null) => {
                appState.currentView = viewName;
                const contentArea = document.getElementById('app-content');
                const fab = document.getElementById('fab-add-post');

                // Atualiza seleção na navegação
                if (navElement) {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    navElement.classList.add('active');
                } else {
                    document.querySelectorAll('.nav-item').forEach(el => {
                        if (el.dataset.view === viewName) el.classList.add('active');
                        else el.classList.remove('active');
                    });
                }

                fab.style.display = viewName === 'feed' ? 'flex' : 'none';
                contentArea.innerHTML = '';

                if (viewName === 'feed') app.renderFeed();
                else if (viewName === 'perfil') app.renderProfile();
                else if (viewName === 'chat') app.renderChat();
                else if (viewName === 'ranking') app.renderRanking();
            },

            // --- FEED DE POSTAGENS ---
            renderFeed: () => {
                const contentArea = document.getElementById('app-content');
                // Limpeza absoluta da área para evitar duplicação (BUG RESOLVIDO)
                contentArea.innerHTML = ''; 
                
                const posts = DB.get('posts', []);

                if (posts.length === 0) {
                    contentArea.innerHTML = `
                        <div class="placeholder-view">
                            <i class="fa-solid fa-satellite"></i>
                            <h3>Feed Vazio</h3>
                            <p>Seja o primeiro a publicar uma transmissão!</p>
                        </div>
                    `;
                    return;
                }

                // Ordena por data (mais recente primeiro)
                posts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                posts.forEach(post => {
                    const isLiked = post.likes && post.likes.includes(appState.currentUser.uid);
                    const likeCount = post.likes ? post.likes.length : 0;
                    const dateObj = new Date(post.createdAt);
                    const timeStr = dateObj.toLocaleDateString('pt-BR') + ' ' + String(dateObj.getHours()).padStart(2, '0') + ':' + String(dateObj.getMinutes()).padStart(2, '0');
                    
                    const imgHtml = post.image ? `<img src="${post.image}" class="post-image" alt="Anexo">` : '';
                    const isMyPost = post.authorUid === appState.currentUser.uid;

                    const delBtn = isMyPost ? 
                        `<button class="action-btn" onclick="app.deletePost('${post.id}')" style="margin-left: auto; color: var(--danger);"><i class="fa-solid fa-trash"></i></button>` : '';

                    const article = document.createElement('article');
                    article.className = 'post-card';
                    article.innerHTML = `
                        <div class="post-header">
                            <img src="${post.authorAvatar}" alt="Avatar" class="avatar" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=fallback'">
                            <div class="user-info">
                                <h3>${post.authorName}</h3>
                                <span>${post.authorHandle} • ${timeStr}</span>
                            </div>
                        </div>
                        <p class="post-content">${post.content.replace(/\n/g, '<br>')}</p>
                        ${imgHtml}
                        <div class="post-actions">
                            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="app.toggleLike('${post.id}')">
                                <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${likeCount}
                            </button>
                            <button class="action-btn" onclick="app.showToast('Comentários salvos localmente', 'info')">
                                <i class="fa-regular fa-comment"></i>
                            </button>
                            ${delBtn}
                        </div>
                    `;
                    contentArea.appendChild(article);
                });
            },

            // Criar Novo Post
            openPostModal: () => document.getElementById('modal-post').classList.add('active'),
            closePostModal: () => {
                document.getElementById('modal-post').classList.remove('active');
                document.getElementById('post-content').value = '';
                app.removeImagePreview();
            },

            handleImageUpload: (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 3 * 1024 * 1024) {
                    app.showToast("Escolha uma imagem menor que 3MB.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    // Compressão rápida via Canvas para otimizar o LocalStorage
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX = 700;

                        if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                        else if (height > MAX) { width *= MAX / height; height = MAX; }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
                        appState.tempBase64Image = dataUrl;
                        document.getElementById('image-preview').src = dataUrl;
                        document.getElementById('image-preview-container').style.display = 'block';
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            },

            removeImagePreview: () => {
                appState.tempBase64Image = null;
                document.getElementById('image-preview').src = '';
                document.getElementById('image-preview-container').style.display = 'none';
                document.getElementById('post-image-input').value = '';
            },

            publishPost: () => {
                const content = document.getElementById('post-content').value.trim();
                if (!content && !appState.tempBase64Image) {
                    app.showToast("Escreva algo ou insira uma imagem.", "error");
                    return;
                }

                const posts = DB.get('posts', []);
                const newPost = {
                    id: 'post_' + Date.now(),
                    authorUid: appState.currentUser.uid,
                    authorName: appState.currentUser.name,
                    authorHandle: appState.currentUser.handle,
                    authorAvatar: appState.currentUser.avatar,
                    content: content,
                    image: appState.tempBase64Image || '',
                    likes: [],
                    createdAt: new Date().toISOString()
                };

                posts.unshift(newPost);
                DB.set('posts', posts);

                app.addXP(15);
                app.closePostModal();
                app.showToast("Transmissão publicada!", "success");
                if (appState.currentView === 'feed') app.renderFeed();
            },

            deletePost: (postId) => {
                if (confirm("Apagar esta transmissão?")) {
                    let posts = DB.get('posts', []);
                    posts = posts.filter(p => p.id !== postId);
                    DB.set('posts', posts);
                    app.showToast("Postagem removida.", "success");
                    app.renderFeed();
                }
            },

            toggleLike: (postId) => {
                const posts = DB.get('posts', []);
                const post = posts.find(p => p.id === postId);
                if (post) {
                    if (!post.likes) post.likes = [];
                    const myUid = appState.currentUser.uid;
                    const idx = post.likes.indexOf(myUid);

                    if (idx > -1) {
                        post.likes.splice(idx, 1);
                    } else {
                        post.likes.push(myUid);
                        app.addXP(2);
                    }

                    DB.set('posts', posts);
                    if (appState.currentView === 'feed') app.renderFeed();
                }
            },

            // --- CHAT / COMMS ---
            renderChat: () => {
                const contentArea = document.getElementById('app-content');
                contentArea.innerHTML = '';
                contentArea.appendChild(document.getElementById('tpl-chat').content.cloneNode(true));

                const container = document.getElementById('chat-messages-container');
                const messages = DB.get('messages', []);

                container.innerHTML = '';
                messages.forEach(msg => {
                    const isMine = msg.authorUid === appState.currentUser.uid;
                    const dateObj = new Date(msg.createdAt);
                    const timeStr = String(dateObj.getHours()).padStart(2, '0') + ':' + String(dateObj.getMinutes()).padStart(2, '0');

                    const div = document.createElement('div');
                    div.className = `message ${isMine ? 'mine' : ''}`;
                    div.innerHTML = `
                        ${!isMine ? `<img src="${msg.authorAvatar}" class="msg-avatar" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=fallback'">` : ''}
                        <div class="msg-bubble">
                            ${!isMine ? `<div class="msg-author">${msg.authorName}</div>` : ''}
                            <div class="msg-text">${msg.content}</div>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    `;
                    container.appendChild(div);
                });

                // Rola para a base garantindo que o flexbox engatou
                setTimeout(() => {
                    container.scrollTop = container.scrollHeight;
                }, 50);
            },

            handleChatKeyPress: (e) => {
                if (e.key === 'Enter') app.sendChatMessage();
            },

            sendChatMessage: () => {
                const input = document.getElementById('chat-input');
                const content = input.value.trim();
                if (!content) return;

                const messages = DB.get('messages', []);
                const newMsg = {
                    id: 'msg_' + Date.now(),
                    authorUid: appState.currentUser.uid,
                    authorName: appState.currentUser.name,
                    authorAvatar: appState.currentUser.avatar,
                    content: content,
                    createdAt: new Date().toISOString()
                };

                messages.push(newMsg);
                DB.set('messages', messages);
                input.value = '';

                app.addXP(3);
                
                // Otimização do Chat: Insere diretamente na DOM para não refazer o layout e manter o foco fluído no mobile
                const container = document.getElementById('chat-messages-container');
                if (container) {
                    const dateObj = new Date(newMsg.createdAt);
                    const timeStr = String(dateObj.getHours()).padStart(2, '0') + ':' + String(dateObj.getMinutes()).padStart(2, '0');

                    const div = document.createElement('div');
                    div.className = `message mine`;
                    div.innerHTML = `
                        <div class="msg-bubble">
                            <div class="msg-text">${newMsg.content}</div>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    `;
                    container.appendChild(div);

                    setTimeout(() => {
                        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                    }, 50);
                }
            },

            // --- RANKING ---
            renderRanking: () => {
                const contentArea = document.getElementById('app-content');
                contentArea.innerHTML = '';
                contentArea.appendChild(document.getElementById('tpl-ranking').content.cloneNode(true));
                const container = document.getElementById('ranking-list-container');

                const botUsers = DB.get('bot_users', []);
                const allUsers = [...botUsers, appState.currentUser];

                // Ordena por XP
                allUsers.sort((a, b) => (b.xp || 0) - (a.xp || 0));

                container.innerHTML = '';
                allUsers.forEach((u, idx) => {
                    const div = document.createElement('div');
                    div.className = 'rank-card';
                    div.innerHTML = `
                        <div class="rank-pos">#${idx + 1}</div>
                        <img src="${u.avatar}" class="avatar" style="width: 38px; height: 38px;" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=fallback'">
                        <div class="rank-info">
                            <h4>${u.name} ${u.uid === appState.currentUser.uid ? ' (Você)' : ''}</h4>
                            <span>${u.handle} • Nível ${u.level || 1}</span>
                        </div>
                        <div class="rank-score">${u.xp || 0} XP</div>
                    `;
                    container.appendChild(div);
                });
            },

            // --- PERFIL ---
            renderProfile: () => {
                const ud = appState.currentUser;
                const contentArea = document.getElementById('app-content');

                // Recalcula Nível baseado no XP (a cada 100 XP = +1 Level)
                const computedLevel = Math.floor((ud.xp || 0) / 100) + 1;
                if (computedLevel !== ud.level) {
                    ud.level = computedLevel;
                    DB.set('user_profile', ud);
                }

                contentArea.innerHTML = `
                    <div class="profile-header">
                        <div style="position: relative; display: inline-block; margin-bottom: 0.8rem;">
                            <img src="${ud.avatar}" alt="Avatar" class="profile-avatar" style="margin-bottom: 0;" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=fallback'">
                            <div style="position: absolute; bottom: 0px; right: -5px; background: var(--cyan); color: #000; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 10px var(--cyan);" onclick="document.getElementById('profile-img-upload').click()" title="Alterar Foto">
                                <i class="fa-solid fa-camera" style="font-size: 0.85rem;"></i>
                            </div>
                        </div>
                        <input type="file" id="profile-img-upload" accept="image/*" style="display:none;" onchange="app.handleProfileImageUpload(event)">
                        
                        <h2 class="profile-name">${ud.name}</h2>
                        <span class="profile-handle">${ud.handle}</span>
                        
                        <div class="stats-container">
                            <div class="stat-item">
                                <span class="stat-value neon-purple">LVL ${ud.level}</span>
                                <span class="stat-label">Nível</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value neon-cyan">${ud.xp || 0}</span>
                                <span class="stat-label">Total XP</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">${ud.ncoins || 100}</span>
                                <span class="stat-label">N-Coins</span>
                            </div>
                        </div>
                    </div>
                    
                    <h3 style="margin-bottom: 12px; color: var(--cyan); border-bottom: 1px solid var(--border-glass); padding-bottom: 5px;">Ações do Sistema</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button class="form-control" style="text-align: left; background: rgba(255,255,255,0.05);" onclick="app.showToast('Você está operando diretamente da memória do celular.', 'info')">
                            <i class="fa-solid fa-hard-drive" style="margin-right: 10px; color: var(--cyan);"></i> Armazenamento Local Ativo
                        </button>
                        <button class="form-control" style="text-align: left; background: rgba(255,42,42,0.1); color: var(--danger);" onclick="app.logout()">
                            <i class="fa-solid fa-power-off" style="margin-right: 10px;"></i> Resetar Dados Locais
                        </button>
                    </div>
                `;
            },
            
            // Upload Foto de Perfil 
            handleProfileImageUpload: (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 4 * 1024 * 1024) {
                    app.showToast("Escolha uma imagem menor que 4MB.", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(evt) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX = 400; // Tamanho ideal para profile pic
                        
                        // Recorta em quadrado ou faz resize mantendo proporção
                        if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                        else if (height > MAX) { width *= MAX / height; height = MAX; }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        
                        // Atualiza usuário atual
                        appState.currentUser.avatar = dataUrl;
                        DB.set('user_profile', appState.currentUser);
                        
                        // Atualiza posts anteriores com a foto nova
                        let posts = DB.get('posts', []);
                        posts.forEach(p => {
                            if (p.authorUid === appState.currentUser.uid) { p.authorAvatar = dataUrl; }
                        });
                        DB.set('posts', posts);
                        
                        app.renderProfile();
                        app.showToast("Imagem de perfil atualizada!", "success");
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            },

            // Adiciona XP e salva
            addXP: (val) => {
                if (!appState.currentUser) return;
                appState.currentUser.xp = (appState.currentUser.xp || 0) + val;
                DB.set('user_profile', appState.currentUser);
            },

            // --- CONFIGURAÇÕES ---
            openSettingsModal: () => document.getElementById('modal-settings').classList.add('active'),
            closeSettingsModal: () => document.getElementById('modal-settings').classList.remove('active'),

            // --- NOTIFICAÇÕES TOAST ---
            showToast: (msg, type = 'info') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                let icon = 'fa-circle-info';
                if (type === 'error') icon = 'fa-circle-xmark';
                if (type === 'success') icon = 'fa-circle-check';

                toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'fadeOut 0.3s forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            // --- SISTEMA DE PARTICULAS CYBERPUNK 3D (ATUALIZADO) ---
            initParticles: () => {
                const canvas = document.getElementById('particles');
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationFrameId;

                // Paleta Cyberpunk estrita
                const colors = [
                    { r: 0, g: 243, b: 255 },   // Cyan
                    { r: 255, g: 0, b: 255 },   // Magenta
                    { r: 176, g: 38, b: 255 }   // Purple
                ];

                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    initNodes();
                }
                
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        
                        // Z-index virtual (profundidade Parallax): 0.2 (fundo) até 1.0 (frente)
                        this.z = Math.random() * 0.8 + 0.2; 
                        
                        // Tamanho baseado na profundidade
                        const baseSize = Math.random() * 2.5 + 1.2;
                        this.size = baseSize * this.z;
                        
                        // Velocidade baseada na profundidade (mais perto = mais rápido)
                        const speedFactor = (Math.random() * 0.5 + 0.15) * this.z;
                        this.speedX = (Math.random() - 0.5) * speedFactor;
                        this.speedY = (Math.random() - 0.5) * speedFactor;
                        
                        // Escolha de cor pura
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        
                        // Opacidade e pulsação muito mais visíveis 
                        this.alpha = (Math.random() * 0.7 + 0.5) * this.z; // Bases de opacidade maiores
                        this.alphaChange = (Math.random() * 0.01 + 0.005) * (Math.random() > 0.5 ? 1 : -1);
                    }

                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;

                        // Warp infinito nas bordas da tela
                        if (this.x > canvas.width + 10) this.x = -10;
                        else if (this.x < -10) this.x = canvas.width + 10;
                        
                        if (this.y > canvas.height + 10) this.y = -10;
                        else if (this.y < -10) this.y = canvas.height + 10;

                        // Pulsação suave da opacidade
                        this.alpha += this.alphaChange;
                        if (this.alpha <= 0.25 || this.alpha >= (1.2 * this.z)) {
                            this.alphaChange *= -1;
                        }
                    }

                    draw() {
                        // Core da partícula (Cor mais concentrada)
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 1.5})`; 
                        ctx.fill();

                        // Brilho intenso Neon sem usar shadowBlur (super leve para mobile, mas agora atinge mais partículas)
                        if (this.z > 0.3) {
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.4})`;
                            ctx.fill();
                        }
                    }
                }

                function initNodes() {
                    particles = [];
                    const area = canvas.width * canvas.height;
                    // Mantida quantia otimizada pro mobile, mas o brilho aumentado da a sensacao de mais densidade
                    let count = Math.floor(area / 6000); 
                    count = Math.max(60, Math.min(count, 140)); 
                    
                    for (let i = 0; i < count; i++) {
                        particles.push(new Particle());
                    }
                }

                function drawConnections() {
                    const maxDistance = 110;
                    const maxDistSq = maxDistance * maxDistance; 

                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const p1 = particles[i];
                            const p2 = particles[j];

                            // Somente conecta partículas em profundidades (Z) semelhantes para o efeito 3D
                            if (Math.abs(p1.z - p2.z) > 0.3) continue;

                            const dx = p1.x - p2.x;
                            const dy = p1.y - p2.y;
                            const distSq = dx * dx + dy * dy;

                            if (distSq < maxDistSq) {
                                const dist = Math.sqrt(distSq);
                                // Aumento drástico na opacidade das linhas de rede (Connections)
                                const opacity = Math.min(1, (1 - (dist / maxDistance)) * ((p1.alpha + p2.alpha) / 1.2));
                                
                                ctx.beginPath();
                                ctx.moveTo(p1.x, p1.y);
                                ctx.lineTo(p2.x, p2.y);
                                
                                // Linhas na cor original do ponto
                                ctx.strokeStyle = `rgba(${p1.color.r}, ${p1.color.g}, ${p1.color.b}, ${opacity})`;
                                ctx.lineWidth = 1.4 * ((p1.z + p2.z) / 2); // Levemente mais encorpado
                                ctx.stroke();
                            }
                        }
                    }
                }

                function animate() {
                    // Limpa o canvas padrão
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Blend mode SCREEN faz as cores somarem energia simulando Neon real sobrepondo na tela
                    ctx.globalCompositeOperation = 'screen';
                    
                    drawConnections(); 
                    
                    particles.forEach(p => { 
                        p.update(); 
                        p.draw(); 
                    });

                    // Retorna modo normal
                    ctx.globalCompositeOperation = 'source-over'; 
                    
                    animationFrameId = requestAnimationFrame(animate);
                }

                resize();
                animate();
            }
        };

        // Torna acessível aos eventos onclick no HTML
        window.app = app;

        // Inicializa assim que o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
