<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Hub - Cyberpunk Social</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === VARIÁVEIS GLOBAIS === */
        :root {
            --bg-base: #050507;
            --bg-glass: rgba(15, 15, 20, 0.75);
            --bg-glass-hover: rgba(25, 25, 35, 0.85);
            --border-glass: rgba(0, 243, 255, 0.2);
            
            /* Cores Neon */
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.5);
            --magenta: #ff00ff;
            --magenta-glow: rgba(255, 0, 255, 0.5);
            --purple: #b026ff;
            --purple-glow: rgba(176, 38, 255, 0.5);
            --danger: #ff2a2a;
            --success: #00ff88;
            
            /* Texto */
            --text-main: #e0e0e0;
            --text-muted: #888899;
        }

        /* === RESET & ESTRUTURA === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .neon-text {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        /* === PARTICLES CANVAS === */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            z-index: 0;
            pointer-events: none;
        }

        /* === APP SHELL === */
        #app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(20, 10, 30, 0.85) 0%, rgba(5, 5, 7, 0.95) 70%);
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }

        header {
            padding: 1.2rem 1rem 0.9rem;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan-glow);
            cursor: pointer;
        }

        header .logo span { color: var(--cyan); }

        header .actions { display: flex; gap: 15px; align-items: center; }

        header .actions i {
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            transition: color 0.3s, text-shadow 0.3s;
        }

        header .actions i:hover {
            color: var(--magenta);
            text-shadow: 0 0 10px var(--magenta-glow);
        }

        main {
            flex: 1;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column; 
            scrollbar-width: none;
            position: relative;
        }
        main::-webkit-scrollbar { display: none; }

        /* NAV INFERIOR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            padding-bottom: calc(0.8rem + env(safe-area-inset-bottom));
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex: 1; 
        }

        .nav-item i { font-size: 1.3rem; transition: all 0.3s ease; }
        .nav-item.active { color: var(--cyan); }
        .nav-item.active i { text-shadow: 0 0 15px var(--cyan-glow); transform: translateY(-3px); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -5px; width: 4px; height: 4px;
            background: var(--cyan); border-radius: 50%; box-shadow: 0 0 8px var(--cyan);
        }

        /* FAB - BOTÃO DE CRIAR POST */
        .fab {
            position: absolute;
            bottom: calc(85px + env(safe-area-inset-bottom)); 
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.4);
            cursor: pointer;
            z-index: 15;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(176, 38, 255, 0.6); }
        .fab:active { transform: scale(0.95); }

        /* POST CARDS */
        .post-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease forwards;
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.8rem; cursor: pointer;}
        .avatar {
            width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
            border: 2px solid transparent;
            background-image: linear-gradient(var(--bg-base), var(--bg-base)), linear-gradient(45deg, var(--cyan), var(--purple));
            background-origin: border-box; background-clip: content-box, border-box;
            flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-info h3 { font-size: 0.95rem; margin: 0; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info span { font-size: 0.78rem; color: var(--cyan); }
        
        .badge-verified { color: var(--cyan); font-size: 0.8rem; }

        .post-content { font-size: 0.92rem; line-height: 1.5; margin-bottom: 0.8rem; color: #d8d8d8; word-break: break-word; user-select: text; }
        .post-image { width: 100%; max-height: 380px; object-fit: cover; border-radius: 10px; margin-bottom: 0.8rem; border: 1px solid rgba(0, 243, 255, 0.25); cursor: pointer;}

        .post-actions { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 0.8rem; }
        .action-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.2s; }
        .action-btn i { font-size: 1rem; }
        .action-btn.liked { color: var(--magenta); text-shadow: 0 0 10px var(--magenta-glow); }
        .action-btn:hover { color: var(--cyan); }

        /* PERFIL (LAYOUT CORRIGIDO) */
        .profile-banner { 
            width: 100%; 
            height: 120px; 
            border-radius: 16px 16px 0 0; 
            background-size: cover; 
            background-position: center; 
            background-color: #222; 
            margin-bottom: 0; 
            border: 1px solid rgba(176, 38, 255, 0.25); 
            border-bottom: none;
        }
        
        .profile-header {
            display: flex; flex-direction: column; align-items: center; 
            padding: 3.5rem 1rem 1.8rem; /* Espaçamento extra no topo para a foto não cobrir textos */
            background: var(--bg-glass); border-radius: 0 0 16px 16px; margin-bottom: 1.2rem;
            border: 1px solid rgba(176, 38, 255, 0.25); border-top: none; box-shadow: 0 0 25px rgba(176, 38, 255, 0.12);
            animation: fadeIn 0.4s ease forwards; text-align: center; position: relative;
        }
        
        .profile-avatar-container { 
            position: absolute; 
            top: -42px; /* Posicionamento fixo sobre o limite entre banner e header */
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 5; 
        }
        
        .profile-avatar { 
            width: 85px; height: 85px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--purple); box-shadow: 0 0 15px rgba(176, 38, 255, 0.6); 
            background: var(--bg-base); 
        }
        
        .profile-name { font-size: 1.4rem; color: var(--text-main); margin-bottom: 4px; z-index: 2;}
        .profile-handle { color: var(--cyan); font-size: 0.85rem; margin-bottom: 0.5rem; z-index: 2;}
        .profile-bio { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.2rem; max-width: 90%; }
        
        .stats-container { display: flex; width: 100%; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 0.9rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px;}
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 1.15rem; font-weight: bold; font-family: 'Rajdhani', sans-serif; transition: color 0.3s; }
        .stat-value.neon-purple { color: var(--purple); text-shadow: 0 0 8px rgba(176,38,255,0.6); }
        .stat-value.neon-cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0,243,255,0.6); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

        /* CHAT / COMMS */
        .chat-container { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .chat-header-info { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 12px; flex-shrink: 0; }
        .chat-list-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
        .chat-list-item:hover { background: rgba(255,255,255,0.08); }

        .chat-messages { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 12px; min-height: 0; margin-bottom: 15px; scroll-behavior: smooth; }
        .message { display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.3s ease; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--purple); flex-shrink: 0; cursor: pointer;}
        .msg-bubble { background: rgba(255,255,255,0.06); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); position: relative; user-select: text; }
        .message.mine .msg-bubble { background: rgba(0, 243, 255, 0.12); border-color: rgba(0, 243, 255, 0.3); border-bottom-right-radius: 2px; }
        .message:not(.mine) .msg-bubble { border-bottom-left-radius: 2px; }
        .msg-author { font-size: 0.72rem; color: var(--cyan); margin-bottom: 3px; font-family: 'Rajdhani', sans-serif; font-weight: bold; cursor: pointer;}
        .msg-text { font-size: 0.88rem; line-height: 1.4; word-break: break-word; }
        .msg-time { font-size: 0.62rem; color: var(--text-muted); text-align: right; margin-top: 4px; display: block; }

        .chat-input-area { display: flex; gap: 10px; background: rgba(15, 15, 20, 0.9); padding: 10px 14px; border-radius: 24px; border: 1px solid rgba(0, 243, 255, 0.3); align-items: center; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(0, 243, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); width: 100%; }
        .chat-attach-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
        .chat-attach-btn:hover { color: var(--cyan); }
        .chat-input { flex: 1; background: transparent; border: none; color: white; font-family: 'Inter', sans-serif; outline: none; padding: 6px 4px; font-size: 0.95rem; min-width: 0; }
        .chat-input::placeholder { color: rgba(255,255,255,0.4); }
        .chat-send-btn { background: linear-gradient(135deg, var(--cyan), #0088ff); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; flex-shrink: 0; box-shadow: 0 0 12px rgba(0, 243, 255, 0.5); }
        .chat-send-btn:hover { transform: scale(1.08); box-shadow: 0 0 18px var(--cyan); }

        /* RANKING */
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .rank-card { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); transition: transform 0.2s; cursor: pointer;}
        .rank-card:hover { transform: translateX(4px); background: rgba(255,255,255,0.07); border-color: var(--cyan); }
        .rank-pos { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: bold; color: var(--text-muted); width: 28px; text-align: center; }
        .rank-card:nth-child(1) .rank-pos { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-card:nth-child(2) .rank-pos { color: #c0c0c0; text-shadow: 0 0 10px rgba(192,192,192,0.5); }
        .rank-card:nth-child(3) .rank-pos { color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.5); }
        .rank-info { flex: 1; min-width: 0; }
        .rank-info h4 { font-size: 0.95rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-info span { font-size: 0.75rem; color: var(--text-muted); }
        .rank-score { font-family: 'Rajdhani', sans-serif; font-weight: bold; color: var(--cyan); font-size: 1.1rem; }

        /* PESQUISA */
        .search-bar { width: 100%; padding: 12px 40px 12px 15px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: white; font-family: 'Inter'; outline: none; margin-bottom: 15px; }
        .search-bar:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .search-container { position: relative; }
        .search-icon { position: absolute; right: 15px; top: 12px; color: var(--text-muted); }

        /* COMENTÁRIOS E MODAIS GERAIS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #0a0a0f; width: 90%; max-width: 480px; max-height: 90dvh; display: flex; flex-direction: column; border-radius: 16px; border: 1px solid var(--purple); box-shadow: 0 0 30px rgba(176, 38, 255, 0.25); padding: 1.4rem; position: relative; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; flex-shrink: 0;}
        .modal-header h2 { font-size: 1.1rem; color: var(--cyan); }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
        .close-modal:hover { color: var(--danger); }
        .modal-body { overflow-y: auto; flex: 1; padding-right: 5px;}
        .modal-footer { margin-top: 15px; flex-shrink: 0;}

        /* Formulários Customizados */
        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12); color: white; padding: 12px; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.3s; user-select: text; }
        .form-control:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        textarea.form-control { resize: vertical; min-height: 90px; }
        
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--cyan), var(--purple)); border: none; border-radius: 8px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(176,38,255,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
        .file-upload-btn { display: inline-block; padding: 10px; background: rgba(255,255,255,0.05); border: 1px dashed var(--cyan); border-radius: 8px; color: var(--cyan); cursor: pointer; font-size: 0.85rem; text-align: center; width: 100%; transition: background 0.3s; }
        .file-upload-btn:hover { background: rgba(0,243,255,0.1); }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        #image-preview-container { margin-top: 10px; display: none; position: relative; }
        #image-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-glass); }
        .remove-img-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        /* TOAST NOTIFICAÇÕES */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border-left: 4px solid var(--cyan); color: white; padding: 10px 16px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; animation: slideDown 0.3s ease forwards; }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* TELA DE AUTENTICAÇÃO */
        #auth-setup { position: fixed; top:0; left:0; width: 100vw; height: 100dvh; background: var(--bg-base); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; text-align: center; }
        .glitch-logo { font-size: 2.8rem; font-family: 'Rajdhani', sans-serif; font-weight: bold; text-shadow: 0 0 20px var(--cyan); margin-bottom: 1.5rem; color: white; }
        .glitch-logo span { color: var(--cyan); }

        /* LOADER COMPONENT */
        .cyber-loader { display: none; width: 40px; height: 40px; border: 3px solid rgba(0, 243, 255, 0.3); border-radius: 50%; border-top-color: var(--cyan); animation: spin 1s ease-in-out infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; text-align: center; color: var(--text-muted); animation: fadeIn 0.4s ease; }
        .placeholder-view i { font-size: 2.8rem; color: var(--purple); margin-bottom: 1rem; text-shadow: 0 0 15px var(--purple); }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>
    <div id="toast-container"></div>

    <!-- Tela Inicial: Autenticação -->
    <div id="auth-setup">
        <div class="glitch-logo">NEXUS<span>HUB</span></div>
        <p style="color: var(--text-muted); margin-bottom: 1.8rem; max-width: 320px; font-size: 0.9rem;">
            Acesso ao Link Neural detectado. Identifique-se para entrar na rede global.
        </p>
        
        <div style="width: 100%; max-width: 380px; background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 0 30px rgba(0,243,255,0.1);">
            
            <!-- Etapa 1: Login / Cadastro via Firebase Auth -->
            <div id="auth-login-area">
                <div class="form-group">
                    <input type="email" id="auth-email" class="form-control" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <input type="password" id="auth-password" class="form-control" placeholder="Senha">
                </div>
                <button class="btn-primary" onclick="app.loginEmail()">Conectar Link</button>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary btn-secondary" style="flex: 1;" onclick="app.registerEmail()">Registrar</button>
                    <button class="btn-primary btn-secondary" style="flex: 1; border-color: rgba(255, 255, 255, 0.3);" onclick="app.loginGoogle()">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                </div>
            </div>

            <!-- Etapa 2: Criação de Identidade no Firestore (Apenas p/ novos) -->
            <div id="auth-form-area" style="display: none;">
                <p style="color: var(--cyan); margin-bottom: 1rem; font-size: 0.85rem;">Defina sua identidade na rede:</p>
                <div class="form-group">

    <!-- MOTOR JAVASCRIPT EM MÓDULOS (Firebase V11 Oficial - Sem dependências Gemini) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, onSnapshot, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // === CONFIGURAÇÃO FIREBASE OFICIAL (SUBSTITUA POR SUAS CREDENCIAIS) ===
        const firebaseConfig = {
            apiKey: "AIzaSyAXQeUDL5c1iW3FiinUfDiCJAfyP0r-sd4",
            authDomain: "nexushub-50e4a.firebaseapp.com",
            projectId: "nexushub-50e4a",
            storageBucket: "nexushub-50e4a.appspot.com",
            messagingSenderId: "326940228133",
            appId: "1:326940228133:web:4d5c7b1f2bc750a254ddcc",
            measurementId: "G-L3ZCYEGF0F"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const storage = getStorage(firebaseApp);

        // Caminhos Firestore Standard (Coleções na Raiz)
        const colPosts = collection(db, 'posts');
        const colUsers = collection(db, 'users');
        const colGlobalChat = collection(db, 'global_chat');
        const colPrivateChat = collection(db, 'private_chat');

        // Estado Global da Aplicação
        const appState = {
            firebaseUser: null,
            currentUserData: null,
            currentView: 'feed',
            currentPublicProfileUid: null, // Guardar quem estamos visualizando
            tempBase64Post: null,
            tempBase64Banner: null,
            allPosts: [],
            allUsers: [],
            globalMessages: [],
            privateMessages: [],
            activeChatMode: 'global', 
            activeCommentPostId: null,
            unsubscribePosts: null,
            unsubscribeUsers: null,
            unsubscribeGlobalChat: null,
            unsubscribePrivateChat: null
        };

        const app = {
            init: async () => {
                app.initParticles();
                
                // Observador de Autenticação Oficial
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        appState.firebaseUser = user;
                        
                        document.getElementById('auth-login-area').style.display = 'none';
                        document.getElementById('auth-form-area').style.display = 'none';
                        document.getElementById('auth-loading').style.display = 'block';

                        // Verifica se o usuário já criou o perfil no Firestore
                        const userDocRef = doc(colUsers, user.uid);
                        try {
                            const userDoc = await getDoc(userDocRef);
                            
                            if (userDoc.exists()) {
                                appState.currentUserData = userDoc.data();
                                app.startGame();
                            } else {
                                // Usuário Autenticado mas sem documento criado: Mostrar Setup
                                document.getElementById('auth-setup').style.display = 'flex';
                                document.getElementById('app-container').style.display = 'none';
                                document.getElementById('auth-loading').style.display = 'none';
                                document.getElementById('auth-form-area').style.display = 'block';
                            }
                        } catch (e) {
                            console.error("Erro ao ler usuário:", e);
                            app.showToast("Erro de leitura no servidor central.", "error");
                        }
                    } else {
                        // Deslogado: Mostrar tela inicial de Login
                        appState.firebaseUser = null;
                        document.getElementById('auth-setup').style.display = 'flex';
                        document.getElementById('app-container').style.display = 'none';
                        document.getElementById('auth-loading').style.display = 'none';
                        document.getElementById('auth-form-area').style.display = 'none';
                        document.getElementById('auth-login-area').style.display = 'block';
                    }
                });
            },

            // --- 1. AUTENTICAÇÃO OFICIAL ---
            loginEmail: async () => {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-password').value;
                if(!email || !pass) return app.showToast("Insira email e senha.", "error");
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch(e) { app.showToast("Falha no login: " + e.message, "error"); }
            },

            registerEmail: async () => {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-password').value;
                if(!email || !pass) return app.showToast("Insira email e senha.", "error");
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } catch(e) { app.showToast("Falha no registro: " + e.message, "error"); }
            },

            loginGoogle: async () => {
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                } catch(e) { app.showToast("Erro Google Auth: " + e.message, "error"); }
            },

            logout: async () => {
                if (confirm("Deseja desconectar e sair do Link Neural?")) {
                    await signOut(auth);
                    location.reload(); 
                }
            },

            // --- 2. SETUP DE IDENTIDADE ---
            setupIdentity: async () => {
                const nameInput = document.getElementById('setup-name').value.trim();
                let handleInput = document.getElementById('setup-handle').value.trim();

                if (nameInput.length < 2 || handleInput.length < 2) {
                    app.showToast("Preencha nome e handle com no mínimo 2 caracteres.", "error");
                    return;
                }
                if (!handleInput.startsWith('@')) handleInput = '@' + handleInput;

                const uid = appState.firebaseUser.uid;
                
                document.getElementById('auth-form-area').style.display = 'none';
                document.getElementById('auth-loading').style.display = 'block';

                const newUser = {
                    uid: uid,
                    name: nameInput,
                    handle: handleInput.toLowerCase().replace(/\s/g, ''),
                    avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`,
                    banner: '',
                    bio: 'Conectado à malha neural recentemente.',
                    xp: 50,
                    level: 1,
                    ncoins: 100,
                    followers: [],
                    following: [],
                    role: 'user', 
                    createdAt: new Date().toISOString()
                };

                try {
                    await setDoc(doc(colUsers, uid), newUser);
                    appState.currentUserData = newUser;
                    app.startGame();
                } catch (e) {
                    app.showToast("Erro ao gravar perfil: " + e.message, "error");
                    document.getElementById('auth-form-area').style.display = 'block';
                    document.getElementById('auth-loading').style.display = 'none';
                }
            },

            // Inicia listeners e o app principal
            startGame: () => {
                document.getElementById('auth-setup').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                
                if (appState.currentUserData.role === 'admin') {
                    document.getElementById('admin-icon').style.display = 'inline-block';
                }

                // LISTENERS FIRESTORE (COM ATUALIZAÇÃO DOM OTIMIZADA)
                if (appState.unsubscribePosts) appState.unsubscribePosts();
                appState.unsubscribePosts = onSnapshot(colPosts, (snap) => {
                    appState.allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (appState.currentView === 'feed' || appState.currentView === 'perfil' || appState.currentView === 'public_profile') {
                        app.updatePostsInDOM(); 
                    }
                    if (appState.activeCommentPostId) {
                        app.updateCommentsInDOM(appState.activeCommentPostId);
                    }
                }, e => console.error(e));

                if (appState.unsubscribeUsers) appState.unsubscribeUsers();
                appState.unsubscribeUsers = onSnapshot(colUsers, (snap) => {
                    appState.allUsers = snap.docs.map(d => d.data());
                    
                    const myUpdatedProfile = appState.allUsers.find(u => u.uid === appState.firebaseUser.uid);
                    if (myUpdatedProfile) appState.currentUserData = myUpdatedProfile;

                    if (appState.currentView === 'perfil' || appState.currentView === 'public_profile') {
                        app.updateProfileInDOM();
                    } else if (appState.currentView === 'ranking') {
                        app.renderRanking();
                    } else if (appState.currentView === 'search') {
                        app.performSearch();
                    }

                    // Força atualização dos avatares no feed e chats dinamicamente, sem precisar recarregar
                    if (appState.currentView === 'feed') {
                        app.updatePostsInDOM();
                    }
                    if (appState.currentView === 'chat') {
                        const containers = ['chat-global-container', 'chat-private-container'];
                        containers.forEach(cid => {
                            const c = document.getElementById(cid);
                            if (c) {
                                // Atualiza foto e nome nos balões do chat logados
                                const avatars = c.querySelectorAll('.msg-avatar');
                                avatars.forEach(img => {
                                    const uid = img.getAttribute('data-uid');
                                    if (uid) {
                                        const u = appState.allUsers.find(user => user.uid === uid);
                                        if (u && img.src !== u.avatar) img.src = u.avatar;
                                    }
                                });
                                const names = c.querySelectorAll('.msg-author');
                                names.forEach(div => {
                                    const uid = div.getAttribute('data-uid');
                                    if (uid) {
                                        const u = appState.allUsers.find(user => user.uid === uid);
                                        if (u && div.innerText !== u.name) div.innerText = u.name;
                                    }
                                });
                            }
                        });
                    }
                }, e => console.error(e));

                if (appState.unsubscribeGlobalChat) appState.unsubscribeGlobalChat();
                appState.unsubscribeGlobalChat = onSnapshot(colGlobalChat, (snap) => {
                    appState.globalMessages = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (appState.currentView === 'chat' && appState.activeChatMode === 'global') {
                        app.updateChatInDOM(appState.globalMessages, 'chat-global-container');
                    }
                }, e => console.error(e));

                if (appState.unsubscribePrivateChat) appState.unsubscribePrivateChat();
                appState.unsubscribePrivateChat = onSnapshot(colPrivateChat, (snap) => {
                    appState.privateMessages = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    if (appState.currentView === 'chat') {
                        if (appState.activeChatMode === 'private_list') {
                            app.renderPrivateChatList();
                        } else if (appState.activeChatMode !== 'global') {
                            const myUid = appState.firebaseUser.uid;
                            const conversation = appState.privateMessages.filter(m => 
                                m.participants.includes(myUid) && m.participants.includes(appState.activeChatMode)
                            );
                            app.updateChatInDOM(conversation, 'chat-private-container');
                        }
                    }
                }, e => console.error(e));

                app.navigate('feed');
            },

            // --- 3. STORAGE UPLOAD HELPER ---
            uploadImageToStorage: async (base64Str, folder) => {
                if (!base64Str) return '';
                try {
                    const fileName = `${folder}/${appState.firebaseUser.uid}_${Date.now()}.jpg`;
                    const storageReference = ref(storage, fileName);
                    await uploadString(storageReference, base64Str, 'data_url');
                    return await getDownloadURL(storageReference);
                } catch(e) {
                    console.error("Storage upload error:", e);
                    throw e; // O erro agora sobe para alertar o front-end
                }
            },

            // --- 4. SISTEMA DE NAVEGAÇÃO SPA ---
            navigate: (viewName, navElement = null, additionalData = null) => {
                appState.currentView = viewName;
                if (viewName === 'public_profile') appState.currentPublicProfileUid = additionalData;
                
                if (navElement && typeof navElement.classList !== 'undefined') {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    navElement.classList.add('active');
                } else {
                    document.querySelectorAll('.nav-item').forEach(el => {
                        if (el.dataset.view === viewName) el.classList.add('active');
                        else el.classList.remove('active');
                    });
                }

                const fab = document.getElementById('fab-add-post');
                fab.style.display = viewName === 'feed' ? 'flex' : 'none';
                
                app.renderCurrentView();
            },

            renderCurrentView: () => {
                const contentArea = document.getElementById('app-content');
                
                if (appState.currentView === 'feed') {
                    contentArea.innerHTML = '';
                    app.renderFeed();
                } 
                else if (appState.currentView === 'perfil') {
                    app.renderProfile(appState.currentUserData);
                } 
                else if (appState.currentView === 'search') {
                    contentArea.innerHTML = '';
                    contentArea.appendChild(document.getElementById('tpl-search').content.cloneNode(true));
                    app.performSearch();
                }
                else if (appState.currentView === 'chat') {
                    contentArea.innerHTML = '';
                    contentArea.appendChild(document.getElementById('tpl-chat').content.cloneNode(true));
                    // Recupera o modo de navegação anterior de forma isolada e inteligente, mantendo estado
                    if (!appState.activeChatMode) appState.activeChatMode = 'global';
                    app.switchChatTab(appState.activeChatMode); 
                }
                else if (appState.currentView === 'ranking') {
                    contentArea.innerHTML = '';
                    contentArea.appendChild(document.getElementById('tpl-ranking').content.cloneNode(true));
                    app.renderRanking();
                }
                else if (appState.currentView === 'public_profile') {
                    const user = appState.allUsers.find(u => u.uid === appState.currentPublicProfileUid);
                    if (user) app.renderProfile(user, true);
                }
            },

            // --- 5. FEED E UPDATES INTELIGENTES DE POSTAGENS ---
            renderFeed: () => {
                const contentArea = document.getElementById('app-content');
                contentArea.innerHTML = ''; 
                app.updatePostsInDOM(); 
            },
            
            // Otimização: Atualiza posts dinamicamente em vez de recarregar tudo
            updatePostsInDOM: () => {
                const container = appState.currentView === 'feed' ? document.getElementById('app-content') : document.getElementById('user-posts-container');
                if (!container) return;

                let expectedPosts = [...appState.allPosts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                if (appState.currentView === 'perfil') {
                    expectedPosts = expectedPosts.filter(p => p.authorUid === appState.firebaseUser.uid);
                } else if (appState.currentView === 'public_profile') {
                    expectedPosts = expectedPosts.filter(p => p.authorUid === appState.currentPublicProfileUid);
                }

                if (expectedPosts.length === 0) {
                    if (!container.querySelector('.placeholder-view') && appState.currentView === 'feed') {
                        container.innerHTML = `
                            <div class="placeholder-view">
                                <i class="fa-solid fa-satellite"></i>
                                <h3>Feed Vazio</h3>
                                <p>Seja o primeiro a transmitir algo na rede!</p>
                            </div>
                        `;
                    }
                    return;
                }

                const placeholder = container.querySelector('.placeholder-view');
                if (placeholder) placeholder.remove();

                // 1. Remove os que foram excluídos
                const currentCards = Array.from(container.querySelectorAll('.post-card'));
                currentCards.forEach(card => {
                    const id = card.dataset.id;
                    if (!expectedPosts.find(p => p.id === id)) {
                        card.remove();
                    }
                });

                // 2. Atualiza os existentes e insere novos
                expectedPosts.forEach((post, index) => {
                    const existingEl = container.querySelector(`.post-card[data-id="${post.id}"]`);
                    if (existingEl) {
                        const likeBtn = existingEl.querySelector('.btn-like');
                        if (likeBtn) {
                            const isLiked = post.likes && post.likes.includes(appState.firebaseUser.uid);
                            if (isLiked) {

            handleImageUpload: (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // A restrição prévia de tamanho foi removida.
                // O fluxo delega à compactação interna do Canvas para reduzir tamanhos de foto mobile,
                // eliminando bloqueios arbitrários e prevenindo problemas de upload.

                const reader = new FileReader();
                reader.onload = function(evt) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX = type === 'profile' ? 300 : (type === 'banner' ? 800 : 700);

                        if (width > height && width > MAX) { height *= MAX / width; width = MAX; }
                        else if (height > MAX) { width *= MAX / height; height = MAX; }

                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 

                        if (type === 'post') {
                            appState.tempBase64Post = dataUrl;
                            document.getElementById('image-preview').src = dataUrl;
                            document.getElementById('image-preview-container').style.display = 'block';
                        } else if (type === 'profile') {
                            app.updateProfileImage(dataUrl);
                        } else if (type === 'banner') {
                            appState.tempBase64Banner = dataUrl;
                            app.showToast("Banner pronto. Salve o perfil.", "info");
                            document.getElementById('lbl-banner-upload').innerHTML = `<i class="fa-solid fa-check"></i> Imagem Selecionada`;
                        }
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            },

            removeImagePreview: (type) => {
                if(type==='post') {
                    appState.tempBase64Post = null;
                    document.getElementById('image-preview').src = '';
                    document.getElementById('image-preview-container').style.display = 'none';
                    document.getElementById('post-image-input').value = '';
                }
            },

                    return;
                }

                const btn = document.getElementById('btn-publish');
                btn.disabled = true;
                btn.innerHTML = 'Transmitindo...';

                try {
                    let imageUrl = '';
                    if (appState.tempBase64Post) {
                        imageUrl = await app.uploadImageToStorage(appState.tempBase64Post, 'posts');
                    }

                    const newPost = {
                        authorUid: appState.firebaseUser.uid,
                        content: content,
                        image: imageUrl,
                        likes: [],
                        comments: [],
                        saves: [],
                        createdAt: new Date().toISOString()
                    };

                    await addDoc(colPosts, newPost);
                    app.addXP(15);
                    app.closePostModal(); // Modal e imagem resetados somente ao sucesso
                    app.showToast("Transmissão enviada a rede global!", "success");
                } catch (e) {
                    // Retorna falha específica gerada pelo storage para o front
                    app.showToast("Erro ao transmitir: " + e.message, "error");
                } finally {

                    btn.innerHTML = 'Transmitir Dados';
                }
            },

            toggleLike: async (postId) => {
                if (!appState.firebaseUser) return;
                const post = appState.allPosts.find(p => p.id === postId);
                if (!post) return;

                const postRef = doc(colPosts, postId);
                const uid = appState.firebaseUser.uid;

                // Fire and forget, UI vai atualizar via DOM diffing
                try {
                    if (post.likes.includes(uid)) {
                        await updateDoc(postRef, { likes: arrayRemove(uid) });
                    } else {
                        await updateDoc(postRef, { likes: arrayUnion(uid) });
                        app.addXP(2);
                    }
                } catch (e) { console.error("Like error", e); }

            toggleFollow: async (targetUid) => {
                if (!appState.firebaseUser) return;
                const myUid = appState.firebaseUser.uid;
                const target = appState.allUsers.find(u => u.uid === targetUid);
                if (!target) return;

                const isFollowing = target.followers && target.followers.includes(myUid);

                // Update de Interface Otimista (Muda o Botão Instantaneamente)
                const btn = document.getElementById('btn-follow');
                if (btn && appState.currentPublicProfileUid === targetUid) {
                    const btnStateSeguindo = btn.innerText.includes('Seguindo');

                        btn.innerText = 'Seguir';
                        btn.classList.remove('btn-secondary');
                    } else {
                        btn.innerText = 'Seguindo';
                        btn.classList.add('btn-secondary');
                    }
                }

                // Dispara Lógica Firestore em Background - Retorno garantido por Snapshot
                try {
                    if (isFollowing) {
                        await updateDoc(doc(colUsers, targetUid), { followers: arrayRemove(myUid) });
                        await updateDoc(doc(colUsers, myUid), { following: arrayRemove(targetUid) });
                    } else {
                        await updateDoc(doc(colUsers, targetUid), { followers: arrayUnion(myUid) });
                        await updateDoc(doc(colUsers, myUid), { following: arrayUnion(targetUid) });

            switchChatTab: (mode) => {

                appState.activeChatMode = mode;
                
                const btnGlobal = document.getElementById('tab-global');
                const btnPrivate = document.getElementById('tab-private');

                // Lógica de isolamento de estado (Evita reutilização de containers)
                if (mode === 'global') {
                    if(btnGlobal) btnGlobal.classList.remove('btn-secondary');
                    if(btnPrivate) btnPrivate.classList.add('btn-secondary');
                    if(cGlobal) cGlobal.style.display = 'flex';
                    if(cPrivateList) cPrivateList.style.display = 'none';
                    if(cPrivateChat) cPrivateChat.style.display = 'none';
                    if(inputArea) inputArea.style.display = 'flex';
                    if(info) info.innerHTML = `<i class="fa-solid fa-earth-americas" style="color: var(--cyan);"></i> Canal Global Sincronizado`;
                    
                    app.updateChatInDOM(appState.globalMessages, 'chat-global-container');
                } else if (mode === 'private_list' || mode === 'private') {
                    appState.activeChatMode = 'private_list'; 
                    if(btnPrivate) btnPrivate.classList.remove('btn-secondary');
                    if(btnGlobal) btnGlobal.classList.add('btn-secondary');
                    if(cGlobal) cGlobal.style.display = 'none';
                    if(cPrivateChat) cPrivateChat.style.display = 'none';
                    if(cPrivateList) cPrivateList.style.display = 'flex';
                    if(inputArea) inputArea.style.display = 'none'; 
                    if(info) info.innerHTML = `<i class="fa-solid fa-lock" style="color: var(--purple);"></i> Frequências Privadas`;
                    
                    app.renderPrivateChatList();
                } else {
                    // Chat individual (Private Link com Alguém específico)
                    if(btnPrivate) btnPrivate.classList.remove('btn-secondary');
                    if(btnGlobal) btnGlobal.classList.add('btn-secondary');
                    if(cGlobal) cGlobal.style.display = 'none';
                    if(cPrivateList) cPrivateList.style.display = 'none';
                    if(cPrivateChat) {
                        cPrivateChat.style.display = 'flex';
                        // Só limpa o DOM deste container se o usuário do chat privado tiver mudado, para evitar flicker
                        if (cPrivateChat.dataset.targetUid !== mode) {
                            cPrivateChat.innerHTML = '';
                            cPrivateChat.dataset.targetUid = mode;
                        }
                    }
                    if(inputArea) inputArea.style.display = 'flex';
                    
                    const target = appState.allUsers.find(u => u.uid === mode);
                    if(info) info.innerHTML = `
                        <i class="fa-solid fa-lock" style="color: var(--purple);"></i> Criptografia 1x1 com <span style="color:white;">${target ? target.name : '...'}</span>
                        <br><a href="#" style="color:var(--cyan);font-size:0.7rem;text-decoration:none;" onclick="app.switchChatTab('private_list')">← Voltar a Lista</a>
                    `;

                    const myUid = appState.firebaseUser.uid;
                    const conversation = appState.privateMessages.filter(m => 
                        m.participants.includes(myUid) && m.participants.includes(mode)
                    );
                    app.updateChatInDOM(conversation, 'chat-private-container');
                }
            },

            updateChatInDOM: (messagesArray, containerId) => {
                const container = document.getElementById(containerId);
                if(!container) return;
                
                const sorted = [...messagesArray].sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
                const currentElements = container.querySelectorAll('.message');

                if (currentElements.length === 0 || currentElements.length > sorted.length) {
                    container.innerHTML = '';
                }

                const startIndex = container.querySelectorAll('.message').length;
                const newMessages = sorted.slice(startIndex);

                newMessages.forEach(msg => {
                    const isMine = msg.authorUid === appState.firebaseUser.uid;
                    const dateObj = new Date(msg.createdAt);
                    const timeStr = String(dateObj.getHours()).padStart(2, '0') + ':' + String(dateObj.getMinutes()).padStart(2, '0');
                    
                    const author = appState.allUsers.find(u => u.uid === msg.authorUid) || {name: 'Netrunner', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=x'};

                    const div = document.createElement('div');
                    div.className = `message ${isMine ? 'mine' : ''}`;
                    // Injeta a propriedade data-uid para atualização dinâmica do avatar sem renderizar tudo novamente
                    div.innerHTML = `
                        ${!isMine ? `<img src="${author.avatar}" class="msg-avatar" data-uid="${author.uid}" onclick="app.navigate('public_profile', null, '${author.uid}')">` : ''}
                        <div class="msg-bubble">
                            ${!isMine ? `<div class="msg-author" data-uid="${author.uid}" onclick="app.navigate('public_profile', null, '${author.uid}')">${author.name}</div>` : ''}
                            <div class="msg-text">${msg.content}</div>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    `;
                    container.appendChild(div);
                });

                if (newMessages.length > 0) {
                    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
                }
            },

            startPrivateChat: (targetUid) => {
                app.navigate('chat');
                setTimeout(() => {
                    app.switchChatTab(targetUid); 
                }, 100);
            },

            renderPrivateChatList: () => {
                const container = document.getElementById('private-chats-list');
                if(!container) return;
                container.innerHTML = '';
                const myUid = appState.firebaseUser.uid;

                const myChats = appState.privateMessages.filter(m => m.participants.includes(myUid));
                const chatMap = {};
                
                myChats.forEach(m => {
                    const otherUid = m.participants.find(p => p !== myUid);
                    if(otherUid) {
                        if(!chatMap[otherUid] || new Date(m.createdAt) > new Date(chatMap[otherUid].createdAt)) {
                            chatMap[otherUid] = m;
                        }
                    }
                });

                const uniqueUsers = Object.keys(chatMap);
                
                if (uniqueUsers.length === 0) {
                    container.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:20px;">Nenhum link privado aberto. Encontre usuários na Busca.</p>`;
                    return;
                }

                uniqueUsers.forEach(uid => {
                    const user = appState.allUsers.find(u => u.uid === uid) || {name: 'Unknown', handle: '@unknown', avatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=x'};
                    const lastMsg = chatMap[uid].content;
                    
                    const div = document.createElement('div');
                    div.className = 'chat-list-item';
                    div.onclick = () => app.startPrivateChat(uid);
                    div.innerHTML = `
                        <img src="${user.avatar}" class="avatar" style="width: 44px; height: 44px;">
                        <div class="user-info">
                            <h3>${user.name}</h3>
                            <span style="color:var(--text-muted);">${lastMsg.substring(0, 30)}${lastMsg.length>30?'...':''}</span>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color:var(--border-glass);"></i>
                    `;
                    container.appendChild(div);
                });
            },

            handleChatKeyPress: (e) => {
                if (e.key === 'Enter') app.sendChatMessage();
            },

            sendChatMessage: async () => {
                if (!appState.firebaseUser) return;
                const input = document.getElementById('chat-input');
                const content = input.value.trim();
                if (!content) return;

                input.value = '';
                const baseMsg = {
                    authorUid: appState.firebaseUser.uid,
                    content: content,
                    createdAt: new Date().toISOString()
                };

                try {
                    if (appState.activeChatMode === 'global') {
                        await addDoc(colGlobalChat, baseMsg);
                        app.addXP(1);
                    } else {
                        baseMsg.participants = [appState.firebaseUser.uid, appState.activeChatMode];
                        await addDoc(colPrivateChat, baseMsg);
                    }
                } catch(e) { app.showToast("Falha de transmissão.", "error"); }
            },

            // --- 9. RANKING E XP ---
            renderRanking: () => {
                const container = document.getElementById('ranking-list-container');
                if(!container) return;
                
                const sortedUsers = [...appState.allUsers].sort((a, b) => (b.xp || 0) - (a.xp || 0)).slice(0, 50); 
                container.innerHTML = '';
                
                sortedUsers.forEach((u, idx) => {
                    const isMe = u.uid === appState.firebaseUser?.uid;
                    const div = document.createElement('div');
                    div.className = 'rank-card';
                    div.onclick = () => app.navigate('public_profile', null, u.uid);
                    div.innerHTML = `
                        <div class="rank-pos">#${idx + 1}</div>
                        <img src="${u.avatar}" class="avatar" style="width: 38px; height: 38px;" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=fallback'">
                        <div class="rank-info">
                            <h4>${u.name} ${isMe ? ' (Você)' : ''} ${u.role === 'admin' ? '<i class="fa-solid fa-certificate badge-verified"></i>' : ''}</h4>
                            <span>${u.handle} • Nível ${u.level || 1}</span>
                        </div>
                        <div class="rank-score">${u.xp || 0} XP</div>
                    `;
                    container.appendChild(div);
                });
            },

            addXP: async (amount) => {
                if (!appState.firebaseUser || !appState.currentUserData) return;
                const newXp = (appState.currentUserData.xp || 0) + amount;
                const newCoins = (appState.currentUserData.ncoins || 0) + Math.floor(amount / 2);
                try {
                    await updateDoc(doc(colUsers, appState.firebaseUser.uid), { xp: newXp, ncoins: newCoins });
                } catch(e) {}
            },

            openAdminModal: () => {
                if (appState.currentUserData.role !== 'admin') return;
                alert("Painel Admin Restrito.\nNível de Acesso Reconhecido.\nVocê já possui poderes de exclusão direta de qualquer postagem ou comentário no sistema!");
            },

            // --- UTILS ---
            showToast: (msg, type = 'info') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                let icon = 'fa-circle-info';
                if (type === 'error') icon = 'fa-circle-xmark';
                if (type === 'success') icon = 'fa-circle-check';

                toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${msg}</span>`;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'fadeOut 0.3s forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            initParticles: () => {
                const canvas = document.getElementById('particles');
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationFrameId;

                const colors = [
                    { r: 0, g: 243, b: 255 }, { r: 255, g: 0, b: 255 }, { r: 176, g: 38, b: 255 }
                ];

                function resize() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    initNodes();
                }
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.z = Math.random() * 0.8 + 0.2; 
                        const baseSize = Math.random() * 2.5 + 1.2;
                        this.size = baseSize * this.z;
                        const speedFactor = (Math.random() * 0.5 + 0.15) * this.z;
                        this.speedX = (Math.random() - 0.5) * speedFactor;
                        this.speedY = (Math.random() - 0.5) * speedFactor;
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        this.alpha = (Math.random() * 0.7 + 0.5) * this.z; 
                        this.alphaChange = (Math.random() * 0.01 + 0.005) * (Math.random() > 0.5 ? 1 : -1);
                    }
                    update() {
                        this.x += this.speedX; this.y += this.speedY;
                        if (this.x > canvas.width + 10) this.x = -10;
                        else if (this.x < -10) this.x = canvas.width + 10;
                        if (this.y > canvas.height + 10) this.y = -10;
                        else if (this.y < -10) this.y = canvas.height + 10;
                        this.alpha += this.alphaChange;
                        if (this.alpha <= 0.25 || this.alpha >= (1.2 * this.z)) { this.alphaChange *= -1; }
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 1.5})`; 
                        ctx.fill();
                        if (this.z > 0.3) {
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.4})`;
                            ctx.fill();
                        }
                    }
                }
                function initNodes() {
                    particles = [];
                    const area = canvas.width * canvas.height;
                    let count = Math.max(60, Math.min(Math.floor(area / 6000), 140)); 
                    for (let i = 0; i < count; i++) { particles.push(new Particle()); }
                }
                function drawConnections() {
                    const maxDistance = 110;
                    const maxDistSq = maxDistance * maxDistance; 
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const p1 = particles[i];
                            const p2 = particles[j];
                            if (Math.abs(p1.z - p2.z) > 0.3) continue;
                            const dx = p1.x - p2.x; const dy = p1.y - p2.y;
                            const distSq = dx * dx + dy * dy;
                            if (distSq < maxDistSq) {
                                const dist = Math.sqrt(distSq);
                                const opacity = Math.min(1, (1 - (dist / maxDistance)) * ((p1.alpha + p2.alpha) / 1.2));
                                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                                ctx.strokeStyle = `rgba(${p1.color.r}, ${p1.color.g}, ${p1.color.b}, ${opacity})`;
                                ctx.lineWidth = 1.4 * ((p1.z + p2.z) / 2);
                                ctx.stroke();
                            }
                        }
                    }
                }
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.globalCompositeOperation = 'screen';
                    drawConnections(); 
                    particles.forEach(p => { p.update(); p.draw(); });
                    ctx.globalCompositeOperation = 'source-over'; 
                    animationFrameId = requestAnimationFrame(animate);
                }
                resize();
                animate();
            }
        };

        window.app = app;
        window.appState = appState;
        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
