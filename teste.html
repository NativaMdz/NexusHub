<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Hub - Cyberpunk Social</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === VARIÁVEIS GLOBAIS === */
        :root {
            --bg-base: #050507;
            --bg-glass: rgba(15, 15, 20, 0.6);
            --bg-glass-hover: rgba(25, 25, 35, 0.8);
            --border-glass: rgba(0, 243, 255, 0.15);
            
            /* Cores Neon */
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.5);
            --magenta: #ff00ff;
            --magenta-glow: rgba(255, 0, 255, 0.5);
            --purple: #b026ff;
            --danger: #ff2a2a;
            --success: #00ff88;
            
            /* Texto */
            --text-main: #e0e0e0;
            --text-muted: #888899;
        }

        /* === RESET & CONFIGURAÇÕES BÁSICAS === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .neon-text {
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }

        /* === PARTICLES CANVAS === */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* === APP SHELL === */
        #app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(20, 10, 30, 0.8) 0%, transparent 70%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        header {
            padding: 1.5rem 1rem 1rem;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan-glow);
            cursor: pointer;
        }

        header .logo span { color: var(--cyan); }

        header .actions i {
            font-size: 1.2rem;
            color: var(--text-main);
            margin-left: 15px;
            cursor: pointer;
            transition: color 0.3s, text-shadow 0.3s;
        }

        header .actions i:hover {
            color: var(--magenta);
            text-shadow: 0 0 10px var(--magenta-glow);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            padding-bottom: 90px;
            scrollbar-width: none;
            position: relative;
        }
        main::-webkit-scrollbar { display: none; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-around;
            padding: 0.8rem 0;
            padding-bottom: calc(0.8rem + env(safe-area-inset-bottom));
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            width: 25%;
        }

        .nav-item i { font-size: 1.4rem; transition: all 0.3s ease; }
        .nav-item.active { color: var(--cyan); }
        .nav-item.active i { text-shadow: 0 0 15px var(--cyan-glow); transform: translateY(-3px); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -5px; width: 4px; height: 4px;
            background: var(--cyan); border-radius: 50%; box-shadow: 0 0 8px var(--cyan);
        }

        /* === BOTÃO FLUTUANTE (FAB) === */
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.4);
            cursor: pointer;
            z-index: 5;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fab:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(176, 38, 255, 0.6); }
        .fab:active { transform: scale(0.95); }

        /* === FEED E POSTAGENS === */
        .post-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease forwards;
        }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
        .avatar {
            width: 45px; height: 45px; border-radius: 12px; object-fit: cover;
            border: 2px solid transparent;
            background-image: linear-gradient(var(--bg-base), var(--bg-base)), linear-gradient(45deg, var(--cyan), var(--purple));
            background-origin: border-box; background-clip: content-box, border-box;
        }

        .user-info { flex: 1; }
        .user-info h3 { font-size: 1rem; margin: 0; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .user-info span { font-size: 0.8rem; color: var(--cyan); }
        
        .badge-verified { color: var(--cyan); font-size: 0.8rem; }

        .post-content { font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem; color: #d0d0d0; word-break: break-word; }
        .post-image { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(0, 243, 255, 0.2); }

        .post-actions { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.8rem; }
        .action-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: color 0.3s; }
        .action-btn i { font-size: 1.1rem; }
        .action-btn.liked { color: var(--magenta); text-shadow: 0 0 10px var(--magenta-glow); }
        .action-btn:hover { color: var(--cyan); }

        /* === PERFIL === */
        .profile-header {
            display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
            background: var(--bg-glass); border-radius: 16px; margin-bottom: 1.5rem;
            border: 1px solid rgba(176, 38, 255, 0.2); box-shadow: 0 0 20px rgba(176, 38, 255, 0.1);
            animation: fadeIn 0.4s ease forwards; text-align: center;
        }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--purple); box-shadow: 0 0 15px rgba(176, 38, 255, 0.5); margin-bottom: 1rem; }
        .profile-name { font-size: 1.5rem; color: var(--text-main); margin-bottom: 5px; }
        .profile-handle { color: var(--cyan); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .stats-container { display: flex; width: 100%; justify-content: space-around; background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 1.2rem; font-weight: bold; font-family: 'Rajdhani', sans-serif; }
        .stat-value.neon-purple { color: var(--purple); text-shadow: 0 0 8px rgba(176,38,255,0.6); }
        .stat-value.neon-cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0,243,255,0.6); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        /* === CHAT / COMMS === */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }
        
        .message { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--purple); }
        .msg-bubble { background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .message.mine .msg-bubble { background: rgba(0, 243, 255, 0.1); border-color: var(--cyan); border-bottom-right-radius: 2px; }
        .message:not(.mine) .msg-bubble { border-bottom-left-radius: 2px; }
        .msg-author { font-size: 0.75rem; color: var(--cyan); margin-bottom: 4px; font-family: 'Rajdhani', sans-serif; font-weight: bold; }
        .msg-text { font-size: 0.9rem; line-height: 1.4; word-break: break-word; }
        .msg-time { font-size: 0.65rem; color: var(--text-muted); text-align: right; margin-top: 5px; display: block; }

        .chat-input-area { display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; border: 1px solid var(--border-glass); }
        .chat-input { flex: 1; background: transparent; border: none; color: white; font-family: 'Inter', sans-serif; outline: none; }
        .chat-send-btn { background: var(--cyan); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .chat-send-btn:hover { box-shadow: 0 0 15px var(--cyan-glow); transform: scale(1.05); }

        /* === RANKING === */
        .ranking-list { display: flex; flex-direction: column; gap: 10px; }
        .rank-card { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
        .rank-card:hover { transform: translateX(5px); background: rgba(255,255,255,0.08); border-color: var(--cyan); }
        .rank-pos { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: bold; color: var(--text-muted); width: 30px; text-align: center; }
        .rank-card:nth-child(1) .rank-pos { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-card:nth-child(2) .rank-pos { color: #c0c0c0; text-shadow: 0 0 10px rgba(192,192,192,0.5); }
        .rank-card:nth-child(3) .rank-pos { color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.5); }
        .rank-info { flex: 1; }
        .rank-info h4 { font-size: 1rem; margin: 0; }
        .rank-info span { font-size: 0.8rem; color: var(--text-muted); }
        .rank-score { font-family: 'Rajdhani', sans-serif; font-weight: bold; color: var(--cyan); font-size: 1.2rem; }

        /* === MODAIS & FORMS === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-base); width: 90%; max-width: 500px; border-radius: 16px; border: 1px solid var(--purple); box-shadow: 0 0 30px rgba(176, 38, 255, 0.2); padding: 1.5rem; position: relative; transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .modal-header h2 { font-size: 1.2rem; color: var(--cyan); }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .close-modal:hover { color: var(--danger); }

        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.3s; }
        .form-control:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--cyan), var(--purple)); border: none; border-radius: 8px; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; }
        .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(176,38,255,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .file-upload-wrapper { position: relative; margin-bottom: 1rem; }
        .file-upload-btn { display: inline-block; padding: 8px 15px; background: rgba(255,255,255,0.05); border: 1px dashed var(--cyan); border-radius: 8px; color: var(--cyan); cursor: pointer; font-size: 0.9rem; text-align: center; width: 100%; transition: background 0.3s; }
        .file-upload-btn:hover { background: rgba(0,243,255,0.1); }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        #image-preview-container { margin-top: 10px; display: none; position: relative; }
        #image-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-glass); }
        .remove-img-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

        /* === TOASTS === */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border-left: 4px solid var(--cyan); color: white; padding: 12px 20px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; animation: slideDown 0.3s ease forwards; }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* === SKELETON LOADER === */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
        .skeleton-avatar { width: 45px; height: 45px; border-radius: 12px; }
        .skeleton-text { height: 10px; margin-bottom: 8px; width: 100%; }
        .skeleton-text.short { width: 60%; }
        .skeleton-img { height: 200px; width: 100%; border-radius: 8px; margin-top: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* === AUTH SETUP VIEW === */
        #auth-setup { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; text-align: center; }
        .glitch-logo { font-size: 3rem; font-family: 'Rajdhani', sans-serif; font-weight: bold; text-shadow: 0 0 20px var(--cyan); margin-bottom: 2rem; color: white; }
        .glitch-logo span { color: var(--cyan); }

        /* === ANIMAÇÕES === */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; color: var(--text-muted); animation: fadeIn 0.4s ease; }
        .placeholder-view i { font-size: 3rem; color: var(--purple); margin-bottom: 1rem; text-shadow: 0 0 15px var(--purple); }
    </style>
</head>
<body>

    <!-- Fundo de Partículas Estilo Cyberpunk -->
    <canvas id="particles"></canvas>

    <!-- Container de Notificações -->
    <div id="toast-container"></div>

    <!-- View de Criação de Identidade (Primeiro Login) -->
    <div id="auth-setup" style="display: none;">
        <div class="glitch-logo">NEXUS<span>HUB</span></div>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Inicializando interface neural... Requer identificação.</p>
        <div style="width: 100%; max-width: 400px; background: rgba(255,255,255,0.03); padding: 2rem; border-radius: 16px; border: 1px solid rgba(0, 243, 255, 0.3); box-shadow: 0 0 30px rgba(0,243,255,0.1);">
            <div class="form-group">
                <input type="text" id="setup-name" class="form-control" placeholder="Nome (Ex: Alex Cipher)" maxlength="25">
            </div>
            <div class="form-group">
                <input type="text" id="setup-handle" class="form-control" placeholder="Handle (Ex: @cipher_x)" maxlength="15">
            </div>
            <button class="btn-primary" id="btn-create-identity" onclick="app.setupIdentity()">Conectar à Rede</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app-container" style="display: none;">
        <!-- Cabeçalho -->
        <header>
            <div class="logo" onclick="app.navigate('feed')">NEXUS<span>HUB</span></div>
            <div class="actions">
                <i class="fa-solid fa-bell" onclick="app.showToast('Sem novas transmissões', 'info')"></i>
                <i class="fa-solid fa-right-from-bracket" onclick="app.logout()" title="Desconectar"></i>
            </div>
        </header>

        <!-- Área Principal -->
        <main id="app-content">
            <!-- Conteúdo injetado via JS -->
        </main>

        <!-- Botão Flutuante (Visível apenas no feed) -->
        <div class="fab" id="fab-add-post" onclick="app.openPostModal()" style="display: none;">
            <i class="fa-solid fa-plus"></i>
        </div>

        <!-- Navegação Inferior -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-view="feed" onclick="app.navigate('feed', this)">
                <i class="fa-solid fa-house"></i>
                <span>Feed</span>
            </div>
            <div class="nav-item" data-view="chat" onclick="app.navigate('chat', this)">
                <i class="fa-solid fa-comment-dots"></i>
                <span>Comms</span>
            </div>
            <div class="nav-item" data-view="ranking" onclick="app.navigate('ranking', this)">
                <i class="fa-solid fa-trophy"></i>
                <span>Ranking</span>
            </div>
            <div class="nav-item" data-view="perfil" onclick="app.navigate('perfil', this)">
                <i class="fa-regular fa-user"></i>
                <span>Perfil</span>
            </div>
        </nav>
    </div>

    <!-- Modal Nova Postagem -->
    <div class="modal-overlay" id="modal-post">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Transmissão</h2>
                <button class="close-modal" onclick="app.closePostModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-group">
                <textarea id="post-content" class="form-control" placeholder="O que está acontecendo no submundo?"></textarea>
            </div>
            <div class="file-upload-wrapper">
                <label class="file-upload-btn">
                    <i class="fa-solid fa-image"></i> Anexar Arquivo Visual
                    <input type="file" id="post-image-input" accept="image/*" onchange="app.handleImageUpload(event)">
                </label>
                <div id="image-preview-container">
                    <img id="image-preview" src="" alt="Preview">
                    <button class="remove-img-btn" onclick="app.removeImagePreview()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <button class="btn-primary" id="btn-publish" onclick="app.publishPost()">Transmitir Dados</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- TEMPLATES DAS VIEWS                        -->
    <!-- ========================================== -->

    <template id="tpl-skeleton-feed">
        <div class="post-card skeleton-card">
            <div class="post-header">
                <div class="skeleton skeleton-avatar"></div>
                <div class="user-info">
                    <div class="skeleton skeleton-text short"></div>
                    <div class="skeleton skeleton-text" style="width: 40%"></div>
                </div>
            </div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text short"></div>
            <div class="skeleton skeleton-img"></div>
        </div>
    </template>

    <template id="tpl-chat">
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages-container">
                <!-- Mensagens renderizadas via JS -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="Transmitir na frequência global..." onkeypress="app.handleChatKeyPress(event)">
                <button class="chat-send-btn" onclick="app.sendChatMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-ranking">
        <div style="margin-bottom: 20px; text-align: center;">
            <i class="fa-solid fa-ranking-star" style="font-size: 2rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); margin-bottom: 10px;"></i>
            <h2 style="color: white; margin-bottom: 5px;">Hall of Fame</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Top Netrunners por XP</p>
        </div>
        <div class="ranking-list" id="ranking-list-container">
            <!-- Renderizado via JS -->
        </div>
    </template>

    <!-- ========================================== -->
    <!-- JAVASCRIPT: Firebase, Lógica e SPA         -->
    <!-- ========================================== -->
    <script type="module">
        // Importações Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, query, orderBy, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração Firebase do Ambiente (Variáveis globais injetadas)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nexus-hub-default';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);

        // Caminhos das coleções seguindo as regras do ambiente
        const PUBLIC_PATH = `artifacts/${appId}/public/data`;
        const POSTS_REF = collection(db, PUBLIC_PATH, 'posts');
        const USERS_REF = collection(db, PUBLIC_PATH, 'users'); // Usuários públicos para ranking/perfil
        const CHAT_REF = collection(db, PUBLIC_PATH, 'messages');

        // Estado Global da Aplicação
        window.appState = {
            user: null,
            userData: null,
            currentView: 'feed',
            posts: [],
            unsubPosts: null,
            unsubChat: null,
            unsubRanking: null,
            tempBase64Image: null
        };

        // Objeto Principal de Controle
        const app = {
            // Inicialização
            init: async () => {
                app.initParticles();
                
                // Autenticação Obrigatória antes de queries
                try {
                    if (initialToken) {
                        await signInWithCustomToken(auth, initialToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Erro de Auth:", error);
                    app.showToast("Erro de conexão neural", "error");
                }

                // Observador de Autenticação
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        appState.user = user;
                        await app.checkUserIdentity(user.uid);
                    } else {
                        // Se deslogou
                        document.getElementById('app-container').style.display = 'none';
                        document.getElementById('auth-setup').style.display = 'flex';
                    }
                });
            },

            // Verifica se o usuário já tem um perfil salvo
            checkUserIdentity: async (uid) => {
                try {
                    const userDocRef = doc(db, PUBLIC_PATH, 'users', uid);
                    const docSnap = await getDoc(userDocRef);

                    if (docSnap.exists()) {
                        appState.userData = docSnap.data();
                        document.getElementById('auth-setup').style.display = 'none';
                        document.getElementById('app-container').style.display = 'flex';
                        app.navigate('feed');
                    } else {
                        // Novo usuário, precisa configurar
                        document.getElementById('app-container').style.display = 'none';
                        document.getElementById('auth-setup').style.display = 'flex';
                    }
                } catch (error) {
                    console.error("Erro ao checar identidade:", error);
                }
            },

            // Cria o perfil do usuário
            setupIdentity: async () => {
                const nameInput = document.getElementById('setup-name').value.trim();
                let handleInput = document.getElementById('setup-handle').value.trim();
                const btn = document.getElementById('btn-create-identity');

                if (nameInput.length < 3 || handleInput.length < 3) {
                    app.showToast("Dados insuficientes. Mínimo 3 caracteres.", "error");
                    return;
                }

                if (!handleInput.startsWith('@')) handleInput = '@' + handleInput;

                btn.disabled = true;
                btn.innerText = "Processando...";

                try {
                    const uid = appState.user.uid;
                    const newUser = {
                        uid: uid,
                        name: nameInput,
                        handle: handleInput.toLowerCase().replace(/\s/g, ''),
                        avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`, // Avatar procedual Cyberpunk
                        xp: 0,
                        level: 1,
                        ncoins: 100,
                        joinedAt: new Date().toISOString()
                    };

                    await setDoc(doc(db, PUBLIC_PATH, 'users', uid), newUser);
                    appState.userData = newUser;
                    
                    app.showToast("Identidade Neural Estabelecida!", "success");
                    document.getElementById('auth-setup').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    app.navigate('feed');
                } catch (error) {
                    app.showToast("Erro ao criar registro", "error");
                    btn.disabled = false;
                    btn.innerText = "Tentar Novamente";
                }
            },

            logout: () => {
                signOut(auth);
            },

            // --- NAVEGAÇÃO SPA ---
            navigate: (viewName, navElement = null) => {
                appState.currentView = viewName;
                const contentArea = document.getElementById('app-content');
                const fab = document.getElementById('fab-add-post');
                
                // Atualiza UI da barra
                if (navElement) {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    navElement.classList.add('active');
                } else {
                    document.querySelectorAll('.nav-item').forEach(el => {
                        if(el.dataset.view === viewName) el.classList.add('active');
                        else el.classList.remove('active');
                    });
                }

                // Limpa listeners antigos
                if (appState.unsubPosts) appState.unsubPosts();
                if (appState.unsubChat) appState.unsubChat();
                if (appState.unsubRanking) appState.unsubRanking();

                // FAB visível apenas no feed
                fab.style.display = viewName === 'feed' ? 'flex' : 'none';

                // Renderização baseada na View
                contentArea.innerHTML = ''; 

                if (viewName === 'feed') {
                    // Adiciona Skeletons
                    const skelTpl = document.getElementById('tpl-skeleton-feed').content.cloneNode(true);
                    contentArea.appendChild(skelTpl);
                    contentArea.appendChild(document.getElementById('tpl-skeleton-feed').content.cloneNode(true));
                    app.loadFeed();
                } 
                else if (viewName === 'perfil') {
                    app.renderProfile();
                }
                else if (viewName === 'chat') {
                    contentArea.appendChild(document.getElementById('tpl-chat').content.cloneNode(true));
                    app.loadChat();
                }
                else if (viewName === 'ranking') {
                    contentArea.appendChild(document.getElementById('tpl-ranking').content.cloneNode(true));
                    app.loadRanking();
                }
            },

            // --- LÓGICA DO FEED ---
            loadFeed: () => {
                // Como não podemos usar compound queries complexas garantidas pelo ambiente, 
                // vamos buscar a collection inteira (ou query simples sem índices) e ordenar em JS.
                appState.unsubPosts = onSnapshot(POSTS_REF, (snapshot) => {
                    if (appState.currentView !== 'feed') return;
                    
                    const posts = [];
                    snapshot.forEach(doc => {
                        posts.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Ordenação JS (Mais recente primeiro)
                    posts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    
                    const contentArea = document.getElementById('app-content');
                    contentArea.innerHTML = '';
                    
                    if (posts.length === 0) {
                        contentArea.innerHTML = `
                            <div class="placeholder-view">
                                <i class="fa-solid fa-satellite"></i>
                                <h3>Silêncio no Setor</h3>
                                <p>Nenhuma transmissão interceptada.</p>
                            </div>
                        `;
                        return;
                    }

                    posts.forEach(post => {
                        const isLiked = post.likes && post.likes.includes(appState.user.uid);
                        const likeCount = post.likes ? post.likes.length : 0;
                        const dateObj = new Date(post.createdAt);
                        const timeStr = dateObj.toLocaleDateString('pt-BR') + ' ' + dateObj.getHours() + ':' + String(dateObj.getMinutes()).padStart(2, '0');
                        
                        const imgHtml = post.image ? `<img src="${post.image}" class="post-image" alt="Anexo">` : '';
                        
                        // Badge para Admin/Dev se for o criador original
                        const badge = post.authorHandle === '@cipher_x' ? '<i class="fa-solid fa-certificate badge-verified" title="Verificado"></i>' : '';

                        // Botão deletar (só para o autor)
                        const delBtn = post.authorUid === appState.user.uid ? 
                            `<button class="action-btn" onclick="app.deletePost('${post.id}')" style="margin-left: auto; color: var(--danger);"><i class="fa-solid fa-trash"></i></button>` : '';

                        const article = document.createElement('article');
                        article.className = 'post-card';
                        article.innerHTML = `
                            <div class="post-header">
                                <img src="${post.authorAvatar}" alt="Avatar" class="avatar">
                                <div class="user-info">
                                    <h3>${post.authorName} ${badge}</h3>
                                    <span>${post.authorHandle} • ${timeStr}</span>
                                </div>
                            </div>
                            <p class="post-content">${post.content.replace(/\n/g, '<br>')}</p>
                            ${imgHtml}
                            <div class="post-actions">
                                <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="app.toggleLike('${post.id}')">
                                    <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${likeCount}
                                </button>
                                <button class="action-btn" onclick="app.showToast('Módulo de comentários em construção', 'info')">
                                    <i class="fa-regular fa-comment"></i>
                                </button>
                                ${delBtn}
                            </div>
                        `;
                        contentArea.appendChild(article);
                    });
                }, (error) => {
                    console.error("Erro Feed:", error);
                    app.showToast("Falha na sincronização", "error");
                });
            },

            // --- LÓGICA DE POSTAGEM ---
            openPostModal: () => {
                document.getElementById('modal-post').classList.add('active');
                document.getElementById('post-content').focus();
            },
            closePostModal: () => {
                document.getElementById('modal-post').classList.remove('active');
                document.getElementById('post-content').value = '';
                app.removeImagePreview();
            },
            handleImageUpload: (event) => {
                const file = event.target.files[0];
                if (!file) return;

                // Validação de tamanho basica (> 2MB recusa antes de processar)
                if (file.size > 2 * 1024 * 1024) {
                    app.showToast("Arquivo muito grande. Limite: 2MB", "error");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    // Comprimir a imagem usando Canvas para garantir que caiba no Firestore (limite de 1MB por doc)
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Qualidade 0.7 para WebP/JPEG
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        appState.tempBase64Image = dataUrl;
                        
                        document.getElementById('image-preview').src = dataUrl;
                        document.getElementById('image-preview-container').style.display = 'block';
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            },
            removeImagePreview: () => {
                appState.tempBase64Image = null;
                document.getElementById('image-preview').src = '';
                document.getElementById('image-preview-container').style.display = 'none';
                document.getElementById('post-image-input').value = '';
            },
            publishPost: async () => {
                const content = document.getElementById('post-content').value.trim();
                if (!content && !appState.tempBase64Image) {
                    app.showToast("Dados vazios. Criptografia falhou.", "error");
                    return;
                }

                const btn = document.getElementById('btn-publish');
                btn.disabled = true;
                btn.innerText = "Enviando...";

                try {
                    const newPost = {
                        authorUid: appState.user.uid,
                        authorName: appState.userData.name,
                        authorHandle: appState.userData.handle,
                        authorAvatar: appState.userData.avatar,
                        content: content,
                        image: appState.tempBase64Image,
                        likes: [],
                        createdAt: new Date().toISOString()
                    };

                    await addDoc(POSTS_REF, newPost);
                    
                    // Gamificação: Ganha XP por postar
                    app.addXP(10);
                    
                    app.closePostModal();
                    app.showToast("Transmissão enviada com sucesso", "success");
                } catch (error) {
                    console.error(error);
                    app.showToast("Erro ao transmitir dados", "error");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Transmitir Dados";
                }
            },
            deletePost: async (postId) => {
                if(confirm("Tem certeza que deseja apagar este registro do banco de dados?")) {
                    try {
                        await deleteDoc(doc(db, PUBLIC_PATH, 'posts', postId));
                        app.showToast("Registro apagado", "success");
                    } catch (e) {
                        app.showToast("Erro ao apagar", "error");
                    }
                }
            },
            toggleLike: async (postId) => {
                try {
                    const postRef = doc(db, PUBLIC_PATH, 'posts', postId);
                    const docSnap = await getDoc(postRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const likes = data.likes || [];
                        const uid = appState.user.uid;
                        
                        if (likes.includes(uid)) {
                            // Unlike
                            await updateDoc(postRef, { likes: arrayRemove(uid) });
                        } else {
                            // Like
                            await updateDoc(postRef, { likes: arrayUnion(uid) });
                            app.addXP(1); // Ganha 1 XP por curtir
                        }
                    }
                } catch (e) {
                    console.error("Erro no like:", e);
                }
            },

            // --- LÓGICA DO CHAT ---
            loadChat: () => {
                const container = document.getElementById('chat-messages-container');
                
                appState.unsubChat = onSnapshot(CHAT_REF, (snapshot) => {
                    if (appState.currentView !== 'chat') return;
                    
                    const messages = [];
                    snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                    
                    // Ordena crescente
                    messages.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                    
                    // Limita na view para não explodir a DOM (últimas 50)
                    const lastMessages = messages.slice(-50);
                    
                    container.innerHTML = '';
                    
                    if(lastMessages.length === 0) {
                        container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Nenhum sinal detectado neste canal.</div>';
                    }

                    lastMessages.forEach(msg => {
                        const isMine = msg.authorUid === appState.user.uid;
                        const dateObj = new Date(msg.createdAt);
                        const timeStr = dateObj.getHours() + ':' + String(dateObj.getMinutes()).padStart(2, '0');
                        
                        const div = document.createElement('div');
                        div.className = `message ${isMine ? 'mine' : ''}`;
                        div.innerHTML = `
                            ${!isMine ? `<img src="${msg.authorAvatar}" class="msg-avatar">` : ''}
                            <div class="msg-bubble">
                                ${!isMine ? `<div class="msg-author">${msg.authorName}</div>` : ''}
                                <div class="msg-text">${msg.content}</div>
                                <span class="msg-time">${timeStr}</span>
                            </div>
                        `;
                        container.appendChild(div);
                    });

                    // Scroll para baixo
                    setTimeout(() => container.scrollTop = container.scrollHeight, 50);
                }, (error) => console.error(error));
            },
            handleChatKeyPress: (e) => {
                if (e.key === 'Enter') app.sendChatMessage();
            },
            sendChatMessage: async () => {
                const input = document.getElementById('chat-input');
                const content = input.value.trim();
                if (!content) return;
                
                input.value = '';
                try {
                    await addDoc(CHAT_REF, {
                        authorUid: appState.user.uid,
                        authorName: appState.userData.name,
                        authorAvatar: appState.userData.avatar,
                        content: content,
                        createdAt: new Date().toISOString()
                    });
                    app.addXP(2); // XP por interagir no chat
                } catch (e) {
                    app.showToast("Falha na rede", "error");
                }
            },

            // --- LÓGICA DO RANKING ---
            loadRanking: () => {
                const container = document.getElementById('ranking-list-container');
                
                appState.unsubRanking = onSnapshot(USERS_REF, (snapshot) => {
                    if (appState.currentView !== 'ranking') return;
                    
                    const users = [];
                    snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
                    
                    // Ordena por XP decrescente
                    users.sort((a, b) => (b.xp || 0) - (a.xp || 0));
                    
                    container.innerHTML = '';
                    
                    users.slice(0, 10).forEach((u, index) => {
                        const div = document.createElement('div');
                        div.className = 'rank-card';
                        div.innerHTML = `
                            <div class="rank-pos">#${index + 1}</div>
                            <img src="${u.avatar}" class="avatar" style="width: 40px; height: 40px;">
                            <div class="rank-info">
                                <h4>${u.name}</h4>
                                <span>${u.handle} • Nível ${u.level || 1}</span>
                            </div>
                            <div class="rank-score">${u.xp || 0} XP</div>
                        `;
                        container.appendChild(div);
                    });
                });
            },

            // --- LÓGICA DO PERFIL ---
            renderProfile: () => {
                const ud = appState.userData;
                const contentArea = document.getElementById('app-content');
                
                // Nível Baseado em XP (Ex: Lv 1 = 0 XP, Lv 2 = 100XP, Lv 3 = 300XP)
                // Usando formula simples: nivel = floor(sqrt(xp / 10)) + 1
                const calculatedLvl = Math.floor(Math.sqrt((ud.xp || 0) / 10)) + 1;
                
                // Se subiu de nível, atualiza no banco em background
                if (calculatedLvl > (ud.level || 1)) {
                    updateDoc(doc(db, PUBLIC_PATH, 'users', appState.user.uid), { level: calculatedLvl });
                    ud.level = calculatedLvl;
                    app.showToast(`Subiu para o Nível ${calculatedLvl}!`, "success");
                }

                contentArea.innerHTML = `
                    <div class="profile-header">
                        <img src="${ud.avatar}" alt="Avatar" class="profile-avatar">
                        <h2 class="profile-name">${ud.name}</h2>
                        <span class="profile-handle">${ud.handle}</span>
                        
                        <div class="stats-container">
                            <div class="stat-item">
                                <span class="stat-value neon-purple">LVL ${ud.level || 1}</span>
                                <span class="stat-label">Nível</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value neon-cyan">${ud.xp || 0}</span>
                                <span class="stat-label">Total XP</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">${ud.ncoins || 0}</span>
                                <span class="stat-label">N-Coins</span>
                            </div>
                        </div>
                    </div>
                    
                    <h3 style="margin-bottom: 15px; color: var(--cyan); border-bottom: 1px solid var(--border-glass); padding-bottom: 5px;">Opções de Sistema</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button class="form-control" style="text-align: left; background: rgba(255,255,255,0.05);" onclick="app.showToast('Módulo em desenvolvimento', 'info')">
                            <i class="fa-solid fa-pen-to-square" style="margin-right: 10px; color: var(--cyan);"></i> Editar Identidade
                        </button>
                        <button class="form-control" style="text-align: left; background: rgba(255,255,255,0.05);" onclick="app.showToast('Inventário Neural vazio', 'info')">
                            <i class="fa-solid fa-box" style="margin-right: 10px; color: var(--purple);"></i> Inventário Neural
                        </button>
                        <button class="form-control" style="text-align: left; background: rgba(255,42,42,0.1); color: var(--danger);" onclick="app.logout()">
                            <i class="fa-solid fa-power-off" style="margin-right: 10px;"></i> Desconectar da Rede
                        </button>
                    </div>
                `;
            },

            // --- SISTEMA GAMIFICAÇÃO ---
            addXP: async (amount) => {
                try {
                    const currentXP = appState.userData.xp || 0;
                    const newXP = currentXP + amount;
                    appState.userData.xp = newXP; // Atualiza local para UI responsiva
                    await updateDoc(doc(db, PUBLIC_PATH, 'users', appState.user.uid), { xp: newXP });
                } catch(e) {
                    console.error("Erro ao adicionar XP", e);
                }
            },

            // --- UTILITÁRIOS ---
            showToast: (message, type = 'info') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                let icon = 'fa-circle-info';
                if(type === 'error') icon = 'fa-circle-xmark';
                if(type === 'success') icon = 'fa-circle-check';

                toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'fadeOut 0.3s forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            // --- PARTÍCULAS CANVAS (Preservado e Otimizado) ---
            initParticles: () => {
                const canvas = document.getElementById('particles');
                const ctx = canvas.getContext('2d');
                let particlesArray = [];

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = Math.random() * 1 - 0.5;
                        this.speedY = Math.random() * 1 - 0.5;
                        this.color = Math.random() > 0.5 ? 'rgba(0, 243, 255, 0.4)' : 'rgba(255, 0, 255, 0.4)';
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
                    }
                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                function createParticles() {
                    particlesArray = [];
                    // Otimização: menos partículas no mobile para performance
                    const numberOfParticles = window.innerWidth < 600 ? 40 : 80;
                    for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
                }
                createParticles();

                function animateParticles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].update();
                        particlesArray[i].draw();
                    }
                    requestAnimationFrame(animateParticles);
                }
                animateParticles();
            }
        };

        // Exportar para o escopo global para o HTML (onclick etc) poder acessar
        window.app = app;

        // Inicializar aplicação ao carregar
        document.addEventListener('DOMContentLoaded', app.init);

    </script>
</body>
</html>
